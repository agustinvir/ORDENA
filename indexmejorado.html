<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>ORDENA</title>
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#0e0e0e">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="ORDENA">
<link rel="apple-touch-icon" href="icon-192.png">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@400;600;700;800;900&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #0e0e0e;
  --bg2: #161616;
  --bg3: #1e1e1e;
  --surface: #242424;
  --border: #2a2a2a;
  --accent: #c8f04a;
  --accent2: #a8d438;
  --text: #f0f0ed;
  --text2: #888;
  --text3: #444;
  --red: #ff4d4d;
  --red-bg: #2a1010;
  --green: #4ade80;
  --green-bg: #0f2a1a;
  --radius: 14px;
  --radius-sm: 9px;
  --tab-h: 72px;
  --safe-bottom: env(safe-area-inset-bottom, 0px);
}

* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

body {
  font-family: 'DM Sans', system-ui, sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  max-width: 430px;
  margin: 0 auto;
  overflow-x: hidden;
}

/* scrollbar */
::-webkit-scrollbar { width: 0; }

/* ══ AUTH ══ */
.auth-screen {
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  padding: 0;
  background: var(--bg);
}

.auth-hero {
  background: linear-gradient(160deg, #1a1a1a 0%, var(--bg) 100%);
  padding: 60px 28px 36px;
  position: relative;
  overflow: hidden;
}
.auth-hero::before {
  content: '';
  position: absolute;
  width: 280px; height: 280px;
  border-radius: 50%;
  background: radial-gradient(circle, rgba(200,240,74,0.12) 0%, transparent 70%);
  top: -60px; right: -60px;
  pointer-events: none;
}
.auth-logo {
  font-family: 'Sora', sans-serif;
  font-size: 42px;
  font-weight: 900;
  letter-spacing: -2px;
  color: var(--text);
  line-height: 1;
}
.auth-logo span { color: var(--accent); }
.auth-tagline {
  font-size: 15px;
  color: var(--text3);
  margin-top: 8px;
  font-weight: 500;
  line-height: 1.5;
}

.auth-body {
  flex: 1;
  padding: 24px 20px;
  padding-bottom: calc(28px + var(--safe-bottom));
}

.auth-tabs {
  display: flex;
  background: var(--bg3);
  border-radius: 12px;
  padding: 4px;
  margin-bottom: 24px;
}
.auth-tab {
  flex: 1;
  text-align: center;
  padding: 10px;
  border-radius: 9px;
  cursor: pointer;
  font-size: 14px;
  color: var(--text3);
  border: none;
  background: none;
  font-family: inherit;
  font-weight: 700;
  transition: all 0.2s;
}
.auth-tab.active {
  background: var(--accent);
  color: #0e0e0e;
}

.auth-title { font-family: 'Sora', sans-serif; font-size: 22px; font-weight: 800; margin-bottom: 4px; }
.auth-sub { font-size: 13px; color: var(--text3); margin-bottom: 20px; }

.fg { display: flex; flex-direction: column; gap: 5px; margin-bottom: 14px; }
.fl { font-size: 11px; color: var(--text2); font-weight: 700; letter-spacing: 0.07em; text-transform: uppercase; }
.input-wrap { position: relative; display: flex; align-items: center; }
.iico { position: absolute; left: 14px; font-size: 16px; pointer-events: none; }
.inp {
  border: 1.5px solid var(--border);
  border-radius: var(--radius-sm);
  padding: 13px 44px 13px 44px;
  font-size: 15px;
  font-family: inherit;
  width: 100%;
  background: var(--bg3);
  color: var(--text);
  outline: none;
  transition: all 0.15s;
  -webkit-appearance: none;
}
.inp:focus { border-color: var(--accent); background: var(--bg2); }
.inp.no-icon { padding-left: 14px; }
.eye { position: absolute; right: 12px; background: none; border: none; cursor: pointer; font-size: 16px; color: var(--text3); }

.frow2 { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }

/* password meter */
.pw-bars { display: flex; gap: 4px; margin: 8px 0 4px; }
.pw-bar { height: 4px; flex: 1; border-radius: 99px; background: var(--border); transition: background 0.2s; }
.pw-bar.s1 { background: #ef4444; }
.pw-bar.s2 { background: #f97316; }
.pw-bar.s3 { background: #eab308; }
.pw-bar.s4 { background: #22c55e; }
.pw-rules { display: flex; flex-direction: column; gap: 3px; margin-top: 6px; }
.pw-rule { font-size: 11px; color: var(--text3); display: flex; align-items: center; gap: 5px; }
.pw-rule::before { content: '○'; font-size: 9px; }
.pw-rule.ok { color: var(--green); }
.pw-rule.ok::before { content: '●'; }
.pw-lbl { font-size: 11px; font-weight: 700; color: var(--text3); text-align: right; }

.btn-main {
  background: var(--accent);
  color: #0e0e0e;
  border: none;
  border-radius: var(--radius-sm);
  padding: 15px;
  font-size: 16px;
  font-weight: 800;
  cursor: pointer;
  width: 100%;
  font-family: 'Sora', inherit;
  transition: all 0.15s;
  margin-top: 4px;
  letter-spacing: -0.2px;
  display: flex; align-items: center; justify-content: center; gap: 6px;
}
.btn-main:active { transform: scale(0.98); opacity: 0.9; }
.btn-main:disabled { background: var(--bg3); color: var(--text3); cursor: not-allowed; }
.btn-sec {
  background: var(--bg3);
  color: var(--text2);
  border: none;
  border-radius: var(--radius-sm);
  padding: 13px;
  font-size: 14px;
  font-weight: 700;
  cursor: pointer;
  width: 100%;
  font-family: inherit;
  margin-top: 10px;
}
.btn-sec:active { opacity: 0.8; }

.auth-msg { font-size: 13px; padding: 12px 14px; border-radius: var(--radius-sm); margin-bottom: 14px; display: none; font-weight: 600; }
.auth-msg.err { background: var(--red-bg); color: var(--red); }
.auth-msg.ok  { background: var(--green-bg); color: var(--green); }

.forgot { text-align: right; font-size: 12px; margin-top: -8px; margin-bottom: 14px; }
.forgot a { color: var(--text3); font-weight: 700; cursor: pointer; }

/* ══ APP SHELL ══ */
.app { display: flex; flex-direction: column; min-height: 100vh; }

/* TOP BAR */
.topbar {
  position: sticky; top: 0; z-index: 100;
  background: rgba(14,14,14,0.92);
  backdrop-filter: blur(16px);
  -webkit-backdrop-filter: blur(16px);
  padding: 16px 20px 12px;
  padding-top: calc(16px + env(safe-area-inset-top, 0px));
  border-bottom: 1px solid var(--border);
  display: flex; align-items: center; justify-content: space-between;
}
.topbar-logo { font-family: 'Sora', sans-serif; font-size: 22px; font-weight: 900; letter-spacing: -1px; }
.topbar-logo span { color: var(--accent); }
.topbar-user { font-size: 12px; color: var(--text3); font-weight: 600; }

/* CONTENT */
.main-content {
  flex: 1;
  padding: 20px 16px;
  padding-bottom: calc(var(--tab-h) + 20px + var(--safe-bottom));
  overflow-y: auto;
}

/* BOTTOM TAB BAR */
.tabbar {
  position: fixed; bottom: 0; left: 50%; transform: translateX(-50%);
  width: 100%; max-width: 430px;
  background: rgba(14,14,14,0.95);
  backdrop-filter: blur(20px);
  -webkit-backdrop-filter: blur(20px);
  border-top: 1px solid var(--border);
  display: flex;
  padding-bottom: var(--safe-bottom);
  z-index: 200;
}
.tab-btn {
  flex: 1;
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  gap: 4px;
  padding: 10px 4px 8px;
  border: none; background: none; cursor: pointer;
  font-family: inherit;
  color: var(--text3);
  transition: all 0.15s;
  -webkit-tap-highlight-color: transparent;
  min-height: var(--tab-h);
}
.tab-btn.active { color: var(--accent); }
.tab-icon { font-size: 22px; line-height: 1; }
.tab-label { font-size: 10px; font-weight: 700; letter-spacing: 0.03em; }
.tab-dot { width: 5px; height: 5px; background: var(--accent); border-radius: 50%; position: absolute; top: 8px; }

/* PAGE HEADER */
.page-hdr { margin-bottom: 20px; }
.page-title { font-family: 'Sora', sans-serif; font-size: 26px; font-weight: 900; letter-spacing: -0.5px; }
.page-sub { font-size: 13px; color: var(--text3); margin-top: 2px; }
.page-hdr-row { display: flex; align-items: flex-start; justify-content: space-between; }

/* BUTTONS */
.btn { background: var(--bg3); border: 1px solid var(--border); border-radius: var(--radius-sm); padding: 9px 16px; font-size: 13px; cursor: pointer; font-family: inherit; color: var(--text); font-weight: 700; transition: all 0.15s; }
.btn:active { opacity: 0.7; }
.btn-acc { background: var(--accent); color: #0e0e0e; border: none; }
.btn-sm { padding: 6px 12px; font-size: 12px; }
.btn-del { border-color: #3a1515; color: var(--red); }
.btn-icon { width: 40px; height: 40px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 20px; background: var(--bg3); border: 1px solid var(--border); cursor: pointer; }

/* FAB */
.fab {
  position: fixed;
  bottom: calc(var(--tab-h) + 16px + var(--safe-bottom));
  right: 20px;
  width: 56px; height: 56px;
  background: var(--accent);
  color: #0e0e0e;
  border: none; border-radius: 50%;
  font-size: 26px; font-weight: 900;
  cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  box-shadow: 0 4px 20px rgba(200,240,74,0.35);
  z-index: 150;
  transition: all 0.15s;
}
.fab:active { transform: scale(0.92); }

/* CARDS */
.card { background: var(--bg2); border: 1px solid var(--border); border-radius: var(--radius); overflow: hidden; margin-bottom: 12px; }
.card-hdr { padding: 14px 16px; border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; }
.card-title { font-size: 14px; font-weight: 800; font-family: 'Sora', sans-serif; }
.card-body { padding: 0 16px; }

/* STATS */
.stats-row { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 16px; }
.stats-row.three { grid-template-columns: 1fr 1fr 1fr; }
.stat { background: var(--bg2); border: 1px solid var(--border); border-radius: var(--radius); padding: 14px; }
.stat-lbl { font-size: 10px; color: var(--text3); font-weight: 700; text-transform: uppercase; letter-spacing: 0.06em; margin-bottom: 6px; }
.stat-val { font-family: 'Sora', sans-serif; font-size: 18px; font-weight: 800; letter-spacing: -0.5px; }
.stat-sub { font-size: 10px; color: var(--text3); margin-top: 2px; }

/* ITEMS */
.item { display: flex; align-items: center; gap: 12px; padding: 13px 0; border-bottom: 1px solid var(--border); }
.item:last-child { border-bottom: none; }
.cat-icon { border-radius: 10px; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
.item-info { flex: 1; min-width: 0; }
.item-title { font-size: 14px; font-weight: 700; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.item-meta { font-size: 12px; color: var(--text3); margin-top: 2px; }
.item-right { display: flex; flex-direction: column; align-items: flex-end; gap: 4px; flex-shrink: 0; }
.item-amt { font-family: 'Sora', sans-serif; font-size: 15px; font-weight: 800; color: var(--red); }
.item-actions { display: flex; gap: 6px; }

/* BADGES */
.badge { display: inline-flex; align-items: center; gap: 3px; padding: 2px 8px; border-radius: 99px; font-size: 11px; font-weight: 700; }
.b-teal { background: #0f2a20; color: #4ade80; }
.b-amber { background: #2a1f0a; color: #fbbf24; }
.b-red { background: #2a0f0f; color: #f87171; }
.b-blue { background: #0f1a2a; color: #60a5fa; }
.b-purple { background: #1a0f2a; color: #c084fc; }
.b-coral { background: #2a0f15; color: #fb7185; }
.b-green { background: #0f2a15; color: #4ade80; }
.b-pink { background: #2a0f1f; color: #f472b6; }
.b-yellow { background: #2a2010; color: #fde047; }
.b-sky { background: #0f1f2a; color: #38bdf8; }
.b-gray { background: var(--bg3); color: var(--text2); }

/* TABS */
.seg { display: flex; background: var(--bg3); border-radius: 10px; padding: 3px; margin-bottom: 16px; }
.seg-btn { flex: 1; text-align: center; padding: 8px; border-radius: 8px; font-size: 13px; color: var(--text3); border: none; background: none; font-family: inherit; font-weight: 700; cursor: pointer; transition: all 0.12s; }
.seg-btn.active { background: var(--accent); color: #0e0e0e; }

/* PERIOD */
.period-sw { display: flex; background: var(--bg3); border-radius: 10px; padding: 3px; margin-bottom: 16px; }
.period-btn { flex: 1; text-align: center; padding: 8px; border-radius: 8px; font-size: 13px; color: var(--text3); border: none; background: none; font-family: inherit; font-weight: 700; cursor: pointer; }
.period-btn.active { background: var(--surface); color: var(--text); }

/* MONTH NAV */
.month-nav { display: flex; align-items: center; justify-content: space-between; margin-bottom: 16px; background: var(--bg2); border: 1px solid var(--border); border-radius: var(--radius); padding: 12px 16px; }
.month-nav button { background: var(--bg3); border: 1px solid var(--border); border-radius: 8px; width: 34px; height: 34px; cursor: pointer; font-size: 16px; color: var(--text); display: flex; align-items: center; justify-content: center; }
.month-lbl { font-family: 'Sora', sans-serif; font-size: 15px; font-weight: 800; }

/* CALENDAR */
.cal-grid { display: grid; grid-template-columns: repeat(7,1fr); gap: 3px; }
.cal-hdr { text-align: center; font-size: 11px; color: var(--text3); padding: 6px 2px; font-weight: 700; }
.cal-day { min-height: 54px; border-radius: 8px; padding: 5px 4px; background: var(--bg2); cursor: pointer; border: 1px solid transparent; transition: all 0.1s; }
.cal-day:active { opacity: 0.7; }
.cal-day.today { border-color: var(--accent); }
.cal-day.other { opacity: 0.2; }
.cal-num { font-size: 11px; font-weight: 800; margin-bottom: 3px; text-align: center; }
.cal-ev { font-size: 9px; background: #1a2a3a; color: #60a5fa; border-radius: 3px; padding: 1px 3px; margin-bottom: 1px; overflow: hidden; white-space: nowrap; text-overflow: ellipsis; font-weight: 700; }
.cal-ev.gasto { background: #2a1f0a; color: #fbbf24; }

/* MODAL */
.modal-ov { position: fixed; inset: 0; background: rgba(0,0,0,0.7); display: flex; align-items: flex-end; z-index: 1000; backdrop-filter: blur(4px); }
.modal {
  background: var(--bg2);
  border-radius: 20px 20px 0 0;
  width: 100%;
  max-height: 92vh;
  overflow-y: auto;
  padding-bottom: calc(20px + var(--safe-bottom));
  animation: slideUp 0.25s cubic-bezier(0.34,1.56,0.64,1);
}
@keyframes slideUp { from { transform: translateY(100%); } to { transform: translateY(0); } }
.modal-handle { width: 40px; height: 4px; background: var(--border); border-radius: 99px; margin: 12px auto 16px; }
.modal-hdr { padding: 0 20px 16px; display: flex; align-items: center; justify-content: space-between; border-bottom: 1px solid var(--border); }
.modal-title { font-family: 'Sora', sans-serif; font-size: 18px; font-weight: 800; }
.modal-x { background: var(--bg3); border: none; width: 30px; height: 30px; border-radius: 50%; cursor: pointer; font-size: 14px; color: var(--text2); display: flex; align-items: center; justify-content: center; }
.modal-body { padding: 20px; display: flex; flex-direction: column; gap: 14px; }
.mfg { display: flex; flex-direction: column; gap: 6px; }
.mfl { font-size: 11px; color: var(--text2); font-weight: 700; text-transform: uppercase; letter-spacing: 0.06em; }
.minp { border: 1.5px solid var(--border); border-radius: var(--radius-sm); padding: 13px 14px; font-size: 15px; font-family: inherit; width: 100%; background: var(--bg3); color: var(--text); outline: none; transition: all 0.15s; -webkit-appearance: none; }
.minp:focus { border-color: var(--accent); }
.mfrow { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }

/* AI */
.ai-box { background: var(--bg2); border: 1px solid var(--border); border-radius: var(--radius); padding: 16px; margin-bottom: 16px; }
.ai-lbl { font-size: 12px; color: var(--text3); margin-bottom: 10px; font-weight: 700; }
.ai-row { display: flex; gap: 8px; }
.ai-inp { flex: 1; border: 1.5px solid var(--border); border-radius: var(--radius-sm); padding: 12px 14px; font-size: 14px; font-family: inherit; background: var(--bg3); color: var(--text); outline: none; transition: all 0.15s; -webkit-appearance: none; }
.ai-inp:focus { border-color: var(--accent); }
.ai-res { margin-top: 10px; font-size: 13px; padding: 12px 14px; background: var(--bg3); border-radius: 9px; display: none; line-height: 1.6; color: var(--text2); }

/* EMPTY */
.empty { text-align: center; padding: 40px 16px; color: var(--text3); }
.empty-icon { font-size: 40px; margin-bottom: 12px; }
.empty p { font-size: 14px; font-weight: 600; }

/* CAT ITEM */
.cat-row { display: flex; align-items: center; gap: 12px; padding: 12px 0; border-bottom: 1px solid var(--border); }
.cat-row:last-child { border-bottom: none; }
.cat-info { flex: 1; }
.cat-name { font-size: 13px; font-weight: 700; }
.cat-bar { height: 4px; background: var(--border); border-radius: 99px; margin-top: 5px; overflow: hidden; }
.cat-bar-fill { height: 100%; background: var(--accent); border-radius: 99px; }

/* PROG */
.prog-row { margin-bottom: 12px; }
.prog-hdr { display: flex; justify-content: space-between; align-items: center; margin-bottom: 5px; }
.prog-bar { height: 6px; background: var(--border); border-radius: 99px; overflow: hidden; }
.prog-fill { height: 100%; background: var(--accent); border-radius: 99px; }

/* TRANSITIONS */
.page { animation: fadeIn 0.18s ease; }
@keyframes fadeIn { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: none; } }

/* CHIP */
.chip { display: inline-flex; align-items: center; gap: 4px; padding: 4px 10px; border-radius: 99px; font-size: 12px; font-weight: 700; background: var(--bg3); color: var(--text2); border: 1px solid var(--border); }
</style>

<div id="root"></div>

const cBadge= id => { const c=CM[id]||CM.Otro; return `<span class="badge ${c.badge}">${c.emoji} ${id}</span>`; };

async function cargar() {
  const [c,g] = await Promise.all([
    sb.from('compromisos').select('*').eq('user_id',currentUser.id).order('fecha',{ascending:true}),
    sb.from('gastos').select('*').eq('user_id',currentUser.id).order('fecha',{ascending:false})
  ]);
  data.compromisos = c.data||[];
  data.gastos = g.data||[];
}

/* ══ PASSWORD ══ */
function checkPw(pw){ return { len:pw.length>=8, upper:/[A-Z]/.test(pw), num:/[0-9]/.test(pw) }; }
function pwScore(pw){ return Object.values(checkPw(pw)).filter(Boolean).length; }
function updatePwUI(pw,prefix){
  const score=pwScore(pw), r=checkPw(pw);
  document.querySelectorAll(`#${prefix}-bars .pw-bar`).forEach((b,i)=>{
    b.className='pw-bar'; if(i<score) b.classList.add(['','s1','s2','s3','s4'][score]||'s4');
  });
  const lbl=document.getElementById(`${prefix}-lbl`);
  if(lbl) lbl.textContent=pw?['','Débil','Regular','Buena','Fuerte'][score]||'':'';
  const ruleMap = {};
  ruleMap[prefix+'-r1'] = r.len;
  ruleMap[prefix+'-r2'] = r.upper;
  ruleMap[prefix+'-r3'] = r.num;
  Object.entries(ruleMap).forEach(([id,ok])=>{ const el=document.getElementById(id); if(el) el.classList.toggle('ok',ok); });
}

function showAuthMsg(tipo,txt){
  ['auth-err','auth-ok'].forEach(id=>{const e=document.getElementById(id);if(e)e.style.display='none';});
  const el=document.getElementById(tipo==='err'?'auth-err':'auth-ok');
  if(el){el.textContent=txt;el.style.display='block';}
}

function toggleEye(id,btn){
  const i=document.getElementById(id);if(!i)return;
  i.type=i.type==='password'?'text':'password';
  btn.textContent=i.type==='password'?'👁️':'🙈';
}

async function login(){
  const email=document.getElementById('l-em')?.value.trim();
  const pass=document.getElementById('l-pw')?.value;
  const btn=document.getElementById('btn-login');
  if(!email||!pass){showAuthMsg('err','Completá email y contraseña.');return;}
  btn.disabled=true; btn.textContent='Ingresando...';
  const {data:d,error}=await sb.auth.signInWithPassword({email,password:pass});
  if(error){showAuthMsg('err',error.message.includes('Invalid')?'Email o contraseña incorrectos':error.message);btn.disabled=false;btn.textContent='Ingresar →';}
  else{currentUser=d.user;await cargar();renderApp();}
}

async function registro(){
  const nom=document.getElementById('r-nom')?.value.trim();
  const ape=document.getElementById('r-ape')?.value.trim();
  const email=document.getElementById('r-em')?.value.trim();
  const pass=document.getElementById('r-pw')?.value;
  const btn=document.getElementById('btn-reg');
  if(!nom||!ape||!email||!pass){showAuthMsg('err','Completá todos los campos.');return;}
  const r=checkPw(pass);
  if(!r.len){showAuthMsg('err','La contraseña debe tener al menos 8 caracteres.');return;}
  if(!r.upper){showAuthMsg('err','Necesitás al menos una letra mayúscula.');return;}
  if(!r.num){showAuthMsg('err','Necesitás al menos un número.');return;}
  btn.disabled=true; btn.textContent='Creando cuenta...';
  const {data:d,error}=await sb.auth.signUp({email,password:pass,options:{data:{full_name:`${nom} ${ape}`,nombre:nom,apellido:ape}}});
  if(error){showAuthMsg('err',error.message);btn.disabled=false;btn.textContent='Crear cuenta →';}
  else if(d.user&&!d.session){showAuthMsg('ok','✅ Revisá tu email para confirmar tu cuenta y luego ingresá.');btn.disabled=false;btn.textContent='Crear cuenta →';}
  else if(d.user){currentUser=d.user;await cargar();renderApp();}
}

async function resetPass(){
  const email=document.getElementById('rst-em')?.value.trim();
  if(!email){showAuthMsg('err','Ingresá tu email.');return;}
  const {error}=await sb.auth.resetPasswordForEmail(email);
  if(error)showAuthMsg('err',error.message);
  else showAuthMsg('ok','✅ Email enviado. Revisá tu bandeja de entrada.');
}

async function logout(){
  await sb.auth.signOut();
  currentUser=null; data={compromisos:[],gastos:[]};
  renderAuth('login');
}

/* ── INICIO ── */

  const h=hoy(), mesK=h.slice(0,7), anioK=h.slice(0,4);
  const nom=(currentUser?.user_metadata?.nombre||'').split(' ')[0];
  const proximos=data.compromisos.filter(c=>c.fecha>=h&&!c.completado).slice(0,3);
  const gastosH=data.gastos.filter(g=>g.fecha===h).reduce((a,b)=>a+Number(b.monto),0);
  const gastosMes=data.gastos.filter(g=>g.fecha.startsWith(mesK)).reduce((a,b)=>a+Number(b.monto),0);
  const gastosAnio=data.gastos.filter(g=>g.fecha.startsWith(anioK)).reduce((a,b)=>a+Number(b.monto),0);
  const ultimosGastos=data.gastos.slice(0,3);
  const hora=new Date().getHours();
  const saludo=hora<12?'Buenos días':hora<18?'Buenas tardes':'Buenas noches';
  return `
  <div class="page-hdr">
    <div class="page-title">${saludo}${nom?' '+nom:''}!</div>

    <div class="stat"><div class="stat-lbl">Este mes</div><div class="stat-val" style="color:var(--red)">${fmt(gastosMes)}</div></div>
    <div class="stat"><div class="stat-lbl">Este año</div><div class="stat-val" style="color:var(--red)">${fmt(gastosAnio)}</div></div>
  </div>
  ${proximos.length?`
  <div class="card">
    <div class="card-hdr"><span class="card-title">Próximos eventos</span><button class="btn btn-sm" onclick="ir('agenda')">Ver todos</button></div>
    <div class="card-body">${proximos.map(rowC).join('')}</div>

/* ── AGENDA ── */
function pagAgenda(){
  const h=hoy();
  const y=curMonth.getFullYear(), m=curMonth.getMonth();
  const dow=new Date(y,m,1).getDay(), last=new Date(y,m+1,0).getDate();
  const days=[];
  for(let i=0;i<dow;i++) days.push({d:new Date(y,m,-dow+i+1),cur:false});
  for(let d=1;d<=last;d++) days.push({d:new Date(y,m,d),cur:true});
  while(days.length<35) days.push({d:new Date(y,m+1,days.length-last-dow+1),cur:false});

  const pend=data.compromisos.filter(c=>!c.completado&&c.fecha>=h).sort((a,b)=>a.fecha.localeCompare(b.fecha)).slice(0,5);

  return `
  <div class="page-hdr page-hdr-row">
    <div><div class="page-title">Agenda</div></div>
  </div>
  <div class="month-nav">
    <button onclick="chgM(-1)">‹</button>
    <span class="month-lbl">${MESES[m]} ${y}</span>
    <button onclick="chgM(1)">›</button>
  </div>
  <div class="cal-grid" style="margin-bottom:20px">
    ${DIAS.map(d=>`<div class="cal-hdr">${d}</div>`).join('')}
    ${days.map(({d,cur})=>{
      const ds=d.toISOString().split('T')[0];
      const evts=data.compromisos.filter(c=>c.fecha===ds);
      const gsts=data.gastos.filter(g=>g.fecha===ds);
      return `<div class="cal-day ${ds===h?'today':''} ${!cur?'other':''}" onclick="verDia('${ds}')">
        <div class="cal-num">${d.getDate()}</div>
        ${evts.slice(0,1).map(e=>`<div class="cal-ev">${e.titulo.slice(0,8)}</div>`).join('')}
        ${gsts.slice(0,1).map(g=>`<div class="cal-ev gasto">${fmt(g.monto)}</div>`).join('')}
      </div>`;
    }).join('')}
  </div>
  <div class="card">
    <div class="card-hdr">
      <span class="card-title">Próximos</span>
      <div class="seg" style="margin:0;background:transparent;padding:0;gap:6px">
        <button class="btn btn-sm" onclick="tabComp(this,'pend')">Pendientes</button>
        <button class="btn btn-sm" onclick="tabComp(this,'comp')">Hechos</button>
      </div>
    </div>
    <div class="card-body" id="clist">${pend.length?pend.map(rowC).join(''):'<div class="empty" style="padding:24px 0"><div class="empty-icon">🎉</div><p>Todo al día</p></div>'}</div>
  </div>`;
}
window.chgM=d=>{curMonth.setMonth(curMonth.getMonth()+d);renderPag();};
window.tabComp=function(btn,tipo){
  const h=hoy();
  const items=tipo==='pend'
    ?data.compromisos.filter(c=>!c.completado&&c.fecha>=h).sort((a,b)=>a.fecha.localeCompare(b.fecha))
    :data.compromisos.filter(c=>c.completado).slice(0,20);
  document.getElementById('clist').innerHTML=items.length?items.map(rowC).join(''):'<div class="empty" style="padding:24px 0"><div class="empty-icon">📭</div><p>Nada aquí</p></div>';
};
window.verDia=function(fecha){
  const evts=data.compromisos.filter(c=>c.fecha===fecha);
  const gsts=data.gastos.filter(g=>g.fecha===fecha);
  const lbl=new Date(fecha+'T12:00:00').toLocaleDateString('es-AR',{weekday:'long',day:'numeric',month:'long'});
  showModal('Día',`<div style="font-size:15px;font-weight:800;margin-bottom:12px;text-transform:capitalize;font-family:'Sora',sans-serif">${lbl}</div>
    ${evts.length?evts.map(rowC).join(''):'<p style="font-size:13px;color:var(--text3)">Sin compromisos</p>'}

    <div style="display:flex;gap:8px;margin-top:16px">
      <button class="btn btn-acc" onclick="cerrar();abrirC('${fecha}')">+ Compromiso</button>
      <button class="btn" onclick="cerrar();abrirG('${fecha}')">+ Gasto</button>
    </div>`);
};

/* ── GASTOS ── */
function getGF(){
  const h=hoy();
  if(gastoPeriod==='diario') return data.gastos.filter(g=>g.fecha===h);
  if(gastoPeriod==='mensual') return data.gastos.filter(g=>g.fecha.startsWith(`${curMonth.getFullYear()}-${String(curMonth.getMonth()+1).padStart(2,'0')}`));
  return data.gastos.filter(g=>g.fecha.startsWith(String(curYear)));
}
function pLabel(){
  if(gastoPeriod==='diario') return `Hoy`;
  if(gastoPeriod==='mensual') return `${MESES[curMonth.getMonth()]} ${curMonth.getFullYear()}`;
  return `Año ${curYear}`;
}
function pagGastos(){
  const gm=getGF(), total=gm.reduce((a,b)=>a+Number(b.monto),0);
  const porCat={};gm.forEach(g=>{porCat[g.categoria]=(porCat[g.categoria]||0)+Number(g.monto);});
  const catList=Object.entries(porCat).sort((a,b)=>b[1]-a[1]);
  const nav=gastoPeriod==='diario'?'':gastoPeriod==='mensual'?
    `<div class="month-nav"><button onclick="chgM(-1);renderPag()">‹</button><span class="month-lbl">${MESES[curMonth.getMonth()]} ${curMonth.getFullYear()}</span><button onclick="chgM(1);renderPag()">›</button></div>`:
    `<div class="month-nav"><button onclick="curYear--;renderPag()">‹</button><span class="month-lbl">Año ${curYear}</span><button onclick="curYear++;renderPag()">›</button></div>`;
  return `
  <div class="page-hdr page-hdr-row">
    <div><div class="page-title">Gastos</div><div class="page-sub">${pLabel()} · ${fmt(total)}</div></div>
  </div>
  <div class="period-sw">
    <button class="period-btn ${gastoPeriod==='diario'?'active':''}" onclick="gastoPeriod='diario';renderPag()">Hoy</button>
    <button class="period-btn ${gastoPeriod==='mensual'?'active':''}" onclick="gastoPeriod='mensual';renderPag()">Mensual</button>
    <button class="period-btn ${gastoPeriod==='anual'?'active':''}" onclick="gastoPeriod='anual';renderPag()">Anual</button>
  </div>
  ${nav}
  <div class="stats-row">
    <div class="stat"><div class="stat-lbl">Total</div><div class="stat-val" style="color:var(--red)">${fmt(total)}</div><div class="stat-sub">${gm.length} gastos</div></div>
    <div class="stat"><div class="stat-lbl">Promedio</div><div class="stat-val">${fmt(gm.length?total/gm.length:0)}</div><div class="stat-sub">por gasto</div></div>
  </div>
  ${catList.length?`
  <div class="card">
    <div class="card-hdr"><span class="card-title">Por categoría</span></div>
    <div class="card-body">
      ${catList.map(([cat,monto])=>{const c=CM[cat]||CM.Otro;return `
        <div class="cat-row">
          <div class="cat-icon" style="width:34px;height:34px;font-size:17px;background:${c.bg};border-radius:9px">${c.emoji}</div>
          <div class="cat-info">
            <div class="cat-name">${cat}</div>
            <div class="cat-bar"><div class="cat-bar-fill" style="width:${total?Math.round(monto/total*100):0}%"></div></div>
          </div>
          <div style="text-align:right;flex-shrink:0">
            <div style="font-family:'Sora',sans-serif;font-size:14px;font-weight:800">${fmt(monto)}</div>
            <div style="font-size:11px;color:var(--text3)">${total?Math.round(monto/total*100):0}%</div>
          </div>
        </div>`;}).join('')}
    </div>
  </div>`:''}
  <div class="card">
    <div class="card-hdr"><span class="card-title">Detalle</span></div>
    <div class="card-body">${gm.length?gm.sort((a,b)=>b.fecha.localeCompare(a.fecha)).map(rowG).join(''):'<div class="empty" style="padding:24px 0"><div class="empty-icon">💸</div><p>Sin gastos</p></div>'}</div>
  </div>`;
}

/* ── RESUMEN ── */
function pagResumen(){
  const ult6=[];
  for(let i=5;i>=0;i--){const d=new Date();d.setMonth(d.getMonth()-i);const k=`${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}`;const t=data.gastos.filter(g=>g.fecha.startsWith(k)).reduce((a,b)=>a+Number(b.monto),0);ult6.push({lbl:MESES[d.getMonth()].slice(0,3),t});}
  const maxB=Math.max(...ult6.map(m=>m.t),1);
  const cats={};data.gastos.forEach(g=>{cats[g.categoria]=(cats[g.categoria]||0)+Number(g.monto);});
  const top=Object.entries(cats).sort((a,b)=>b[1]-a[1]).slice(0,6);
  const tot=data.gastos.reduce((a,b)=>a+Number(b.monto),0);
  const anioA=String(new Date().getFullYear());
  const totA=data.gastos.filter(g=>g.fecha.startsWith(anioA)).reduce((a,b)=>a+Number(b.monto),0);
  const totM=data.gastos.filter(g=>g.fecha.startsWith(hoy().slice(0,7))).reduce((a,b)=>a+Number(b.monto),0);
  return `
  <div class="page-hdr"><div class="page-title">Resumen</div></div>
  <div class="stats-row">
    <div class="stat"><div class="stat-lbl">Este mes</div><div class="stat-val" style="color:var(--red)">${fmt(totM)}</div><div class="stat-sub">${MESES[new Date().getMonth()]}</div></div>
    <div class="stat"><div class="stat-lbl">Este año</div><div class="stat-val" style="color:var(--red)">${fmt(totA)}</div><div class="stat-sub">${anioA}</div></div>
  </div>
  <div class="stat" style="margin-bottom:16px"><div class="stat-lbl">Histórico total</div><div class="stat-val" style="color:var(--red)">${fmt(tot)}</div><div class="stat-sub">${data.gastos.length} gastos registrados</div></div>
  <div class="card" style="margin-bottom:12px">
    <div class="card-hdr"><span class="card-title">Últimos 6 meses</span></div>
    <div class="card-body" style="padding:16px">
      <div style="display:flex;align-items:flex-end;gap:6px;height:120px">
        ${ult6.map(m=>`<div style="flex:1;display:flex;flex-direction:column;align-items:center;gap:4px">
          <div style="font-size:9px;color:var(--text3);text-align:center">${m.t?fmt(m.t):''}</div>
          <div style="width:100%;background:var(--accent);border-radius:5px 5px 0 0;height:${Math.max(m.t/maxB*90,2)}px;opacity:0.85"></div>
          <div style="font-size:10px;color:var(--text3)">${m.lbl}</div>
        </div>`).join('')}
      </div>
    </div>
  </div>
  <div class="card">
    <div class="card-hdr"><span class="card-title">Top categorías</span></div>
    <div class="card-body">
      ${top.map(([cat,monto])=>{const c=CM[cat]||CM.Otro;return `<div class="prog-row">
        <div class="prog-hdr">
          <div style="display:flex;align-items:center;gap:8px">
            <div class="cat-icon" style="width:26px;height:26px;font-size:13px;background:${c.bg};border-radius:7px">${c.emoji}</div>
            <span style="font-size:13px;font-weight:700">${cat}</span>
          </div>
          <span style="font-family:'Sora',sans-serif;font-size:13px;font-weight:800">${fmt(monto)}</span>
        </div>
        <div class="prog-bar"><div class="prog-fill" style="width:${Math.round(monto/tot*100)}%"></div></div>
      </div>`;}).join('')}
      ${!top.length?'<div class="empty" style="padding:24px 0"><p>Sin datos todavía</p></div>':''}
    </div>
  </div>`;
}

/* ── IA ── */
function pagIA(){return `
  <div class="page-hdr"><div class="page-title">Asistente IA</div><div class="page-sub">Escribí en lenguaje natural</div></div>
  <div class="ai-box">
    <div class="ai-lbl">✦ ORDENA interpreta y guarda automáticamente</div>
    <div class="ai-row">
      <input class="ai-inp" type="text" id="ai-in" placeholder='"Dentista martes 10hs" o "Gasté $5000 en nafta"' onkeydown="if(event.key==='Enter')sendIA()">
      <button class="btn btn-acc" onclick="sendIA()">→</button>
    </div>
    <div class="ai-res" id="ai-res"></div>
  </div>
  <div class="card">
    <div class="card-hdr"><span class="card-title">Ejemplos rápidos</span></div>
    <div class="card-body">
      ${['Dentista martes 29 a las 9hs','Gasté 3500 en comida hoy','Pagué alquiler 80000','Reunión viernes 10am','Nafta 12000 este miércoles','Cumpleaños mamá el 15/05'].map(e=>`
        <div onclick="document.getElementById('ai-in').value='${e}'" style="cursor:pointer;font-size:13px;padding:10px 12px;background:var(--bg3);border-radius:9px;margin-bottom:8px;color:var(--text2);font-weight:500;border:1px solid var(--border)">"${e}"</div>`).join('')}
    </div>
  </div>`;}

async function sendIA(){
  const inp=document.getElementById('ai-in'), res=document.getElementById('ai-res');
  if(!inp?.value.trim()) return;
  const txt=inp.value.trim();
  res.style.display='block'; res.textContent='⏳ Procesando...';
  try{
    const r=await fetch('https://api.anthropic.com/v1/messages',{method:'POST',
      headers:{'Content-Type':'application/json','anthropic-dangerous-request-direct-browser-access':'true'},
      body:JSON.stringify({model:'claude-sonnet-4-20250514',max_tokens:500,
        system:`Asistente ORDENA. Hoy: ${hoy()}. SOLO JSON sin markdown.
Compromiso: {"accion":"compromiso","titulo":"...","fecha":"YYYY-MM-DD","hora":"HH:MM|null","descripcion":"...|null"}
Gasto: {"accion":"gasto","descripcion":"...","monto":numero,"categoria":"Comida|Nafta|Impuestos|Mutual|Renta|Municipalidad|Alquiler|Servicios|Salud|Educación|Entretenimiento|Transporte|Otro","fecha":"YYYY-MM-DD"}
Consulta: {"accion":"consulta","respuesta":"..."}`,
        messages:[{role:'user',content:txt}]})});
    const d=await r.json();
    const raw=d.content?.[0]?.text||'{}';
    let json; try{json=JSON.parse(raw.replace(/```json|```/g,'').trim());}catch{json={accion:'consulta',respuesta:raw};}
    if(json.accion==='compromiso'){
      const {error}=await sb.from('compromisos').insert({user_id:currentUser.id,titulo:json.titulo,fecha:json.fecha,hora:json.hora,descripcion:json.descripcion,completado:false});
      if(!error){await cargar();res.innerHTML=`✅ <strong>${json.titulo}</strong> — ${fmtD(json.fecha)}${json.hora?' a las '+json.hora:''}`;inp.value='';renderPag();}
      else res.textContent='❌ '+error.message;
    }else if(json.accion==='gasto'){
      const {error}=await sb.from('gastos').insert({user_id:currentUser.id,descripcion:json.descripcion,monto:json.monto,categoria:json.categoria,fecha:json.fecha});
      if(!error){await cargar();res.innerHTML=`✅ <strong>${json.descripcion}</strong> ${fmt(json.monto)} · ${json.categoria}`;inp.value='';renderPag();}
      else res.textContent='❌ '+error.message;
    }else res.textContent=json.respuesta||'No entendí.';
  }catch(e){res.textContent='❌ '+e.message;}
}

/* ── MODALS (bottom sheet) ── */
function showModal(titulo,body){
  document.getElementById('modal-ov')?.remove();
  const m=document.createElement('div'); m.id='modal-ov'; m.className='modal-ov';
  m.innerHTML=`<div class="modal">
    <div class="modal-handle"></div>
    <div class="modal-hdr"><span class="modal-title">${titulo}</span><button class="modal-x" onclick="cerrar()">✕</button></div>
    <div class="modal-body">${body}</div>
  </div>`;
  m.onclick=e=>{if(e.target===m)cerrar();};
  document.body.appendChild(m);
}
window.cerrar=()=>document.getElementById('modal-ov')?.remove();

window.abrirC=function(fp=''){
  const c=editing;
  showModal(c?'Editar compromiso':'Nuevo compromiso',`
    <div class="mfg"><label class="mfl">Título *</label><input class="minp" type="text" id="f-tit" value="${c?c.titulo:''}" placeholder="Dentista, Reunión..."></div>
    <div class="mfrow">
      <div class="mfg"><label class="mfl">Fecha *</label><input class="minp" type="date" id="f-fec" value="${c?c.fecha:fp||hoy()}"></div>
      <div class="mfg"><label class="mfl">Hora</label><input class="minp" type="time" id="f-hora" value="${c&&c.hora?c.hora.slice(0,5):''}"></div>
    </div>
    <div class="mfg"><label class="mfl">Notas</label><input class="minp" type="text" id="f-desc" value="${c?c.descripcion||'':''}" placeholder="Opcional..."></div>
    <button class="btn-main" onclick="guardarC('${c?c.id:''}')">${c?'Guardar cambios':'Agregar →'}</button>`);
};
window.guardarC=async function(id=''){
  const t=document.getElementById('f-tit').value.trim();
  const f=document.getElementById('f-fec').value;
  const h=document.getElementById('f-hora').value||null;
  const d=document.getElementById('f-desc').value.trim()||null;
  if(!t||!f){alert('Título y fecha son obligatorios');return;}
  if(id) await sb.from('compromisos').update({titulo:t,fecha:f,hora:h,descripcion:d}).eq('id',id);
  else   await sb.from('compromisos').insert({user_id:currentUser.id,titulo:t,fecha:f,hora:h,descripcion:d,completado:false});
  editing=null;cerrar();await cargar();renderPag();
};

window.abrirG=function(fp=''){
  const g=editing;
  const catOpts=CATS.map(c=>`<option value="${c.id}" ${g&&g.categoria===c.id?'selected':''}>${c.emoji} ${c.id}</option>`).join('');
  showModal(g?'Editar gasto':'Nuevo gasto',`
    <div class="mfg"><label class="mfl">Descripción *</label><input class="minp" type="text" id="g-des" value="${g?g.descripcion:''}" placeholder="Super, YPF, Alquiler..."></div>
    <div class="mfrow">
      <div class="mfg"><label class="mfl">Monto *</label><input class="minp" type="number" id="g-mnt" value="${g?g.monto:''}" placeholder="0" min="0"></div>
      <div class="mfg"><label class="mfl">Fecha *</label><input class="minp" type="date" id="g-fec" value="${g?g.fecha:fp||hoy()}"></div>
    </div>
    <div class="mfg"><label class="mfl">Categoría *</label><select class="minp" id="g-cat">${catOpts}</select></div>
    <button class="btn-main" onclick="guardarG('${g?g.id:''}')">${g?'Guardar cambios':'Registrar →'}</button>`);
};
window.guardarG=async function(id=''){
  const d=document.getElementById('g-des').value.trim();
  const m=parseFloat(document.getElementById('g-mnt').value);
  const f=document.getElementById('g-fec').value;
  const c=document.getElementById('g-cat').value;
  if(!d||isNaN(m)||!f){alert('Completá todos los campos');return;}
  if(id) await sb.from('gastos').update({descripcion:d,monto:m,fecha:f,categoria:c}).eq('id',id);
  else   await sb.from('gastos').insert({user_id:currentUser.id,descripcion:d,monto:m,fecha:f,categoria:c});
  editing=null;cerrar();await cargar();renderPag();
};

window.editC=id=>{editing=data.compromisos.find(c=>c.id===id);cerrar();abrirC();};
window.editG=id=>{editing=data.gastos.find(g=>g.id===id);cerrar();abrirG();};
window.completar=async id=>{await sb.from('compromisos').update({completado:true}).eq('id',id);await cargar();renderPag();};
window.borrar=async function(tabla,id){if(!confirm('¿Eliminar?'))return;await sb.from(tabla).delete().eq('id',id);await cargar();renderPag();};

/* ── INIT ── */
(async()=>{
  const {data:{session}}=await sb.auth.getSession();
  if(session?.user){currentUser=session.user;await cargar();renderApp();}
  else renderAuth('login');
  sb.auth.onAuthStateChange((event)=>{if(event==='SIGNED_OUT'){currentUser=null;renderAuth('login');}});
})();
</script>
</body>
