function fmt(n){return '$'+Math.round(Number(n)).toLocaleString('es-AR');}
function fmtD(d){return new Date(d+'T12:00:00').toLocaleDateString('es-AR',{day:'2-digit',month:'short'});}
function hoy(){return new Date().toISOString().split('T')[0];}
function isDark(){var t=document.documentElement.getAttribute('data-theme');if(t==='dark')return true;if(t==='light')return false;return window.matchMedia&&window.matchMedia('(prefers-color-scheme: dark)').matches;}
function cIcon(id,sz){sz=sz||36;var c=CM[id]||CM['Otro'],bg=isDark()?c.bgd:c.bg;return '<div class="cat-icon" style="width:'+sz+'px;height:'+sz+'px;font-size:'+Math.round(sz*.48)+'px;background:'+bg+';border-radius:'+Math.round(sz*.28)+'px">'+c.emoji+'</div>';}

function applyTheme(t){document.documentElement.setAttribute('data-theme',t);localStorage.setItem('ordena_theme',t);}
function showThemeMenu(){
  var ex=document.getElementById('tm');if(ex){ex.remove();return;}
  var cur=document.documentElement.getAttribute('data-theme')||'auto';
  var opts=[{id:'auto',icon:'🌗',lbl:'Automatico'},{id:'light',icon:'☀️',lbl:'Claro'},{id:'dark',icon:'🌙',lbl:'Oscuro'}];
  var html='';for(var i=0;i<opts.length;i++){var o=opts[i];html+='<div class="theme-opt'+(cur===o.id?' sel':'')+'" data-t="'+o.id+'">'+o.icon+' '+o.lbl+'</div>';}
  var menu=document.createElement('div');menu.id='tm';menu.className='theme-menu';menu.innerHTML=html;
  menu.addEventListener('click',function(e){var opt=e.target.closest('[data-t]');if(opt){applyTheme(opt.getAttribute('data-t'));menu.remove();renderApp();}});

async function cargar(){
  try{
    var r1=await sb.from('compromisos').select('*').eq('user_id',currentUser.id).order('fecha',{ascending:true});
    var r2=await sb.from('gastos').select('*').eq('user_id',currentUser.id).order('fecha',{ascending:false});
    data.compromisos=r1.data||[];data.gastos=r2.data||[];
    await cargarGrupos();
  }catch(e){console.error(e);}
}
async function cargarGrupos(){
  try{
    var r=await sb.from('grupos').select('*, grupo_miembros(*)');
    var r2=await sb.from('grupo_miembros').select('grupo_id, grupos(*, grupo_miembros(*))').eq('user_id',currentUser.id);
    var todos=r.data?r.data.slice():[];
    if(r2.data)r2.data.forEach(function(m){if(m.grupos){var ya=todos.find(function(g){return g.id===m.grupos.id;});if(!ya)todos.push(m.grupos);}});
    grupos=todos;
  }catch(e){grupos=[];}
}
function genCodigo(){var ch='ABCDEFGHJKLMNPQRSTUVWXYZ23456789',c='';for(var i=0;i<6;i++)c+=ch[Math.floor(Math.random()*ch.length)];return c;}
async function crearGrupo(nombre){
  var codigo=genCodigo();
  var r=await sb.from('grupos').insert({nombre:nombre,codigo:codigo,owner_id:currentUser.id}).select().single();
  if(r.error){alert('Error: '+r.error.message);return null;}
  var meta=currentUser.user_metadata||{};
  var nom=((meta.nombre||'')+' '+(meta.apellido||'')).trim();
  await sb.from('grupo_miembros').insert({grupo_id:r.data.id,user_id:currentUser.id,nombre:nom});
  await cargarGrupos();return r.data;
}
async function unirseGrupo(codigo){
  var r=await sb.from('grupos').select('*').eq('codigo',codigo.toUpperCase()).single();
  if(r.error||!r.data){alert('Codigo invalido.');return false;}
  var meta=currentUser.user_metadata||{};
  var nom=((meta.nombre||'')+' '+(meta.apellido||'')).trim();
  var ins=await sb.from('grupo_miembros').insert({grupo_id:r.data.id,user_id:currentUser.id,nombre:nom});
  if(ins.error){alert(ins.error.message.indexOf('unique')>=0?'Ya sos miembro.':ins.error.message);return false;}
  await cargarGrupos();return true;
}

function checkPw(pw){return{len:pw.length>=8,upper:/[A-Z]/.test(pw),num:/[0-9]/.test(pw)};}
function pwScore(pw){var r=checkPw(pw);return(r.len?1:0)+(r.upper?1:0)+(r.num?1:0);}
function updatePwUI(pw,prefix){
  var score=pwScore(pw),r=checkPw(pw),sc=['','s1','s2','s3','s4'];
  document.querySelectorAll('#'+prefix+'-bars .pw-bar').forEach(function(b,i){b.className='pw-bar';if(i<score)b.classList.add(sc[score]||'s4');});
  var lbl=document.getElementById(prefix+'-lbl');if(lbl)lbl.textContent=pw?(['','Debil','Regular','Buena','Fuerte'][score]||''):'';
  [{id:prefix+'-r1',ok:r.len},{id:prefix+'-r2',ok:r.upper},{id:prefix+'-r3',ok:r.num}].forEach(function(x){var el=document.getElementById(x.id);if(el)el.classList.toggle('ok',x.ok);});
}

async function doLogin(){
  var email=document.getElementById('l-em')?document.getElementById('l-em').value.trim():'';
  var pass=document.getElementById('l-pw')?document.getElementById('l-pw').value:'';
  var btn=document.getElementById('btn-login');
  if(!email||!pass){showAuthMsg('err','Completa email y contrasena.');return;}
  btn.disabled=true;btn.textContent='Ingresando...';
  var r=await sb.auth.signInWithPassword({email:email,password:pass});
  if(r.error){showAuthMsg('err',r.error.message.indexOf('Invalid')>=0?'Email o contrasena incorrectos':r.error.message);btn.disabled=false;btn.textContent='Ingresar';}
  else{currentUser=r.data.user;await cargar();renderApp();}
}
async function doRegistro(){
  var nom=document.getElementById('r-nom')?document.getElementById('r-nom').value.trim():'';
  var ape=document.getElementById('r-ape')?document.getElementById('r-ape').value.trim():'';
  var email=document.getElementById('r-em')?document.getElementById('r-em').value.trim():'';
  var pass=document.getElementById('r-pw')?document.getElementById('r-pw').value:'';
  var btn=document.getElementById('btn-reg');
  if(!nom||!ape||!email||!pass){showAuthMsg('err','Completa todos los campos.');return;}
  var r=checkPw(pass);
  if(!r.len){showAuthMsg('err','Min 8 caracteres.');return;}
  if(!r.upper){showAuthMsg('err','Necesitas una mayuscula.');return;}
  if(!r.num){showAuthMsg('err','Necesitas un numero.');return;}
  btn.disabled=true;btn.textContent='Creando...';
  var res=await sb.auth.signUp({email:email,password:pass,options:{data:{full_name:nom+' '+ape,nombre:nom,apellido:ape}}});
  if(res.error){showAuthMsg('err',res.error.message);btn.disabled=false;btn.textContent='Crear cuenta';}
  else if(res.data.user&&!res.data.session){showAuthMsg('ok','Cuenta creada! Revisa tu email.');btn.disabled=false;btn.textContent='Crear cuenta';}
  else if(res.data.user){currentUser=res.data.user;await cargar();renderApp();}
}
async function doReset(){
  var email=document.getElementById('rst-em')?document.getElementById('rst-em').value.trim():'';
  if(!email){showAuthMsg('err','Ingresa tu email.');return;}
  var r=await sb.auth.resetPasswordForEmail(email);
  if(r.error)showAuthMsg('err',r.error.message);else showAuthMsg('ok','Email enviado!');
}

function pagInicio(){
  var h=hoy(),mesK=h.slice(0,7),anioK=h.slice(0,4);
  var meta=currentUser&&currentUser.user_metadata?currentUser.user_metadata:{};
  var nom=meta.nombre?meta.nombre.split(' ')[0]:'';
  var proximos=data.compromisos.filter(function(c){return c.fecha>=h&&!c.completado;}).slice(0,3);
  var gH=data.gastos.filter(function(g){return g.fecha===h;}).reduce(function(a,b){return a+Number(b.monto);},0);
  var gM=data.gastos.filter(function(g){return g.fecha.indexOf(mesK)===0;}).reduce(function(a,b){return a+Number(b.monto);},0);
  var gA=data.gastos.filter(function(g){return g.fecha.indexOf(anioK)===0;}).reduce(function(a,b){return a+Number(b.monto);},0);
  var ultG=data.gastos.slice(0,3);
  var hora=new Date().getHours();
  var saludo=hora<12?'Buenos dias':hora<18?'Buenas tardes':'Buenas noches';
  var html='<div class="page-hdr"><div class="page-title">'+saludo+(nom?', '+nom:'')+'!</div><div class="page-sub">'+new Date().toLocaleDateString('es-AR',{weekday:'long',day:'numeric',month:'long'})+'</div></div>'+
    '<div class="stats-row three">'+
      '<div class="stat"><div class="stat-lbl">Hoy</div><div class="stat-val" style="color:var(--danger)">'+fmt(gH)+'</div></div>'+
      '<div class="stat"><div class="stat-lbl">Este mes</div><div class="stat-val" style="color:var(--danger)">'+fmt(gM)+'</div></div>'+
      '<div class="stat"><div class="stat-lbl">Este ano</div><div class="stat-val" style="color:var(--danger)">'+fmt(gA)+'</div></div>'+
    '</div>';
  if(proximos.length)html+='<div class="card"><div class="card-hdr"><span class="card-title">Proximos eventos</span><button class="btn btn-sm" onclick="ir(\'agenda\')">Ver todos</button></div><div class="card-body">'+proximos.map(rowC).join('')+'</div></div>';
  if(ultG.length)html+='<div class="card"><div class="card-hdr"><span class="card-title">Ultimos gastos</span><button class="btn btn-sm" onclick="ir(\'gastos\')">Ver todos</button></div><div class="card-body">'+ultG.map(function(g){return rowG(g,false);}).join('')+'</div></div>';
  if(!proximos.length&&!ultG.length)html+='<div class="empty"><div class="empty-icon">✨</div><p>Todo listo para empezar!</p></div>';
  return html;
}
function rowC(c){

    '<div class="item-info"><div class="item-title" style="'+(c.completado?'opacity:.35;text-decoration:line-through':'')+'">'+c.titulo+'</div>'+

function rowG(g,enGrupo){

    '<div class="item-right"><div class="item-amt">'+fmt(g.monto)+'</div>'+acciones+'</div></div>';

function pagAgenda(){
  var h=hoy(),y=curMonth.getFullYear(),m=curMonth.getMonth();
  var dow=new Date(y,m,1).getDay(),last=new Date(y,m+1,0).getDate(),days=[];
  for(var i=0;i<dow;i++)days.push({d:new Date(y,m,-dow+i+1),cur:false});
  for(var d=1;d<=last;d++)days.push({d:new Date(y,m,d),cur:true});
  while(days.length<35)days.push({d:new Date(y,m+1,days.length-last-dow+1),cur:false});
  var pend=data.compromisos.filter(function(c){return !c.completado&&c.fecha>=h;}).sort(function(a,b){return a.fecha.localeCompare(b.fecha);}).slice(0,5);
  var calHtml='';
  for(var i=0;i<DIAS.length;i++)calHtml+='<div class="cal-hdr">'+DIAS[i]+'</div>';
  for(var i=0;i<days.length;i++){
    var item=days[i],ds=item.d.toISOString().split('T')[0];
    var evts=data.compromisos.filter(function(c){return c.fecha===ds;}),gsts=data.gastos.filter(function(g){return g.fecha===ds;});
    calHtml+='<div class="cal-day'+(ds===h?' today':'')+(item.cur?'':' other')+'" onclick="verDia(\''+ds+'\')">'+
      '<div class="cal-num">'+item.d.getDate()+'</div>'+
      (evts.length?'<div class="cal-ev">'+evts[0].titulo.slice(0,8)+'</div>':'')+
      (gsts.length?'<div class="cal-ev gasto">'+fmt(gsts[0].monto)+'</div>':'')+
    '</div>';
  }
  return '<div class="page-hdr"><div class="page-title">Agenda</div></div>'+
    '<div class="month-nav"><button onclick="chgM(-1)">‹</button><span class="month-lbl">'+MESES[m]+' '+y+'</span><button onclick="chgM(1)">›</button></div>'+
    '<div class="cal-grid" style="margin-bottom:18px">'+calHtml+'</div>'+
    '<div class="card"><div class="card-hdr"><span class="card-title">Proximos</span>'+
      '<div style="display:flex;gap:6px"><button class="btn btn-sm" onclick="tabComp(\'pend\')">Pendientes</button><button class="btn btn-sm" onclick="tabComp(\'comp\')">Hechos</button></div></div>'+
      '<div class="card-body" id="clist">'+(pend.length?pend.map(rowC).join(''):'<div class="empty" style="padding:24px 0"><div class="empty-icon">🎉</div><p>Todo al dia!</p></div>')+'</div></div>';
}
window.chgM=function(d){curMonth.setMonth(curMonth.getMonth()+d);renderPag();};
window.tabComp=function(tipo){
  var h=hoy(),items=tipo==='pend'
    ?data.compromisos.filter(function(c){return !c.completado&&c.fecha>=h;}).sort(function(a,b){return a.fecha.localeCompare(b.fecha);})
    :data.compromisos.filter(function(c){return c.completado;}).slice(0,20);
  var el=document.getElementById('clist');
  if(el)el.innerHTML=items.length?items.map(rowC).join(''):'<div class="empty" style="padding:24px 0"><div class="empty-icon">📭</div><p>Nada aqui</p></div>';

function getGF(){

  if(gastoPeriod==='diario')return base.filter(function(g){return g.fecha===h;});
  if(gastoPeriod==='mensual')return base.filter(function(g){return g.fecha.indexOf(mesK)===0;});

async function sendIA(){
  var inp=document.getElementById('ai-in'),res=document.getElementById('ai-res'),btn=document.getElementById('ai-btn');
  if(!inp||!inp.value.trim())return;
  var txt=inp.value.trim();
  res.style.display='block';res.textContent='Procesando...';
  if(btn){btn.disabled=true;btn.textContent='...';}
  try{
    var r=await fetch('https://api.anthropic.com/v1/messages',{
      method:'POST',
      headers:{'Content-Type':'application/json','anthropic-dangerous-request-direct-browser-access':'true'},
      body:JSON.stringify({
        model:'claude-sonnet-4-20250514',max_tokens:500,
        system:'Asistente ORDENA. Hoy: '+hoy()+'. Responde SOLO JSON sin texto extra. Compromiso: {"accion":"compromiso","titulo":"...","fecha":"YYYY-MM-DD","hora":"HH:MM o null","descripcion":"... o null"} Gasto: {"accion":"gasto","descripcion":"...","monto":numero,"categoria":"Comida|Nafta|Impuestos|Mutual|Renta|Municipalidad|Alquiler|Servicios|Salud|Educacion|Entretenimiento|Transporte|Otro","fecha":"YYYY-MM-DD"} Consulta: {"accion":"consulta","respuesta":"..."}',
        messages:[{role:'user',content:txt}]
      })
    });
    if(!r.ok){res.textContent='Error de red: '+r.status;return;}
    var d=await r.json();
    var raw=d.content&&d.content[0]?d.content[0].text:'{}';
    var json;try{json=JSON.parse(raw.replace(/```json|```/g,'').trim());}catch(e){json={accion:'consulta',respuesta:raw};}
    if(json.accion==='compromiso'){
      var ins=await sb.from('compromisos').insert({user_id:currentUser.id,titulo:json.titulo,fecha:json.fecha,hora:json.hora||null,descripcion:json.descripcion||null,completado:false});
      if(!ins.error){await cargar();res.innerHTML='✅ Guardado: <strong>'+json.titulo+'</strong> — '+fmtD(json.fecha)+(json.hora?' a las '+json.hora:'');inp.value='';renderPag();}
      else res.textContent='Error: '+ins.error.message;
    }else if(json.accion==='gasto'){
      var ins2=await sb.from('gastos').insert({user_id:currentUser.id,descripcion:json.descripcion,monto:json.monto,categoria:json.categoria,fecha:json.fecha});
      if(!ins2.error){await cargar();res.innerHTML='✅ Guardado: <strong>'+json.descripcion+'</strong> '+fmt(json.monto)+' · '+json.categoria;inp.value='';renderPag();}
      else res.textContent='Error: '+ins2.error.message;
    }else res.textContent=json.respuesta||'No entendi.';
  }catch(e){res.textContent='Error: '+e.message;}
  finally{if(btn){btn.disabled=false;btn.textContent='→';}}
}

  editing=null;cerrar();await cargar();renderPag();
};
window.editC=function(id){editing=data.compromisos.find(function(c){return c.id===id;});cerrar();abrirC();};
window.editG=function(id){editing=data.gastos.find(function(g){return g.id===id;});cerrar();abrirG();};
window.completar=async function(id){await sb.from('compromisos').update({completado:true}).eq('id',id);await cargar();renderPag();};
window.borrar=async function(tabla,id){if(!confirm('Eliminar?'))return;await sb.from(tabla).delete().eq('id',id);await cargar();renderPag();};

(async function(){
  applyTheme(localStorage.getItem('ordena_theme')||'auto');
  var r=await sb.auth.getSession();
  if(r.data&&r.data.session&&r.data.session.user){currentUser=r.data.session.user;await cargar();renderApp();}
  else renderAuth('login');
  sb.auth.onAuthStateChange(function(event){if(event==='SIGNED_OUT'){currentUser=null;renderAuth('login');}});
})();
</script>
