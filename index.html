/* ══ PASSWORD STRENGTH ══ */
function checkPw(pw){
  return {
    len: pw.length>=8,
    upper: /[A-Z]/.test(pw),
    num: /[0-9]/.test(pw),
    special: /[^A-Za-z0-9]/.test(pw),
  };
}
function pwScore(pw){
  const r=checkPw(pw);
  return Object.values(r).filter(Boolean).length;
}
function pwLabel(score){
  return ['','Muy débil','Débil','Buena','Fuerte'][score]||'';
}
function updatePwUI(pw,prefix){
  const score=pwScore(pw);
  const r=checkPw(pw);
  const bars=document.querySelectorAll(`#${prefix}-bars .pw-bar`);
  bars.forEach((b,i)=>{
    b.className='pw-bar';
    if(i<score){
      if(score===1)b.classList.add('s1');
      else if(score===2)b.classList.add('s2');
      else if(score===3)b.classList.add('s3');
      else b.classList.add('s4');
    }
  });
  const lbl=document.getElementById(`${prefix}-lbl`);
  if(lbl)lbl.textContent=pw?pwLabel(score):'';
  const rules={
    [`${prefix}-r1`]:r.len,
    [`${prefix}-r2`]:r.upper,
    [`${prefix}-r3`]:r.num,
  };
  Object.entries(rules).forEach(([id,ok])=>{
    const el=document.getElementById(id);
    if(el){el.classList.toggle('ok',ok);}
  });
}

function toggleEye(id,btn){
  const i=document.getElementById(id);if(!i)return;
  i.type=i.type==='password'?'text':'password';
  btn.textContent=i.type==='password'?'👁️':'🙈';
}

async function login(){
  const email=document.getElementById('l-email')?.value.trim();
  const pass=document.getElementById('l-pass')?.value;
  const btn=document.getElementById('btn-login');
  if(!email||!pass){showAuthMsg('err','Completá email y contraseña.');return;}
  btn.disabled=true;btn.innerHTML='Ingresando... ⏳';
  const {data:d,error}=await sb.auth.signInWithPassword({email,password:pass});
  if(error){
    showAuthMsg('err',error.message.includes('Invalid login')?'Email o contraseña incorrectos. Verificá tus datos.':error.message);
    btn.disabled=false;btn.innerHTML='Ingresar <span class="arrow">→</span>';
  }else{currentUser=d.user;await cargar();renderApp();}
}

async function registro(){
  const nom=document.getElementById('r-nom')?.value.trim();
  const ape=document.getElementById('r-ape')?.value.trim();
  const email=document.getElementById('r-email')?.value.trim();
  const pass=document.getElementById('r-pass')?.value;
  const btn=document.getElementById('btn-reg');
  if(!nom||!ape||!email||!pass){showAuthMsg('err','Completá todos los campos.');return;}
  const r=checkPw(pass);
  if(!r.len){showAuthMsg('err','La contraseña debe tener al menos 8 caracteres.');return;}
  if(!r.upper){showAuthMsg('err','La contraseña debe tener al menos una letra mayúscula.');return;}
  if(!r.num){showAuthMsg('err','La contraseña debe tener al menos un número.');return;}
  btn.disabled=true;btn.innerHTML='Creando cuenta... ⏳';
  const {data:d,error}=await sb.auth.signUp({email,password:pass,options:{data:{full_name:`${nom} ${ape}`,nombre:nom,apellido:ape}}});
  if(error){
    showAuthMsg('err',error.message);btn.disabled=false;btn.innerHTML='Crear cuenta <span class="arrow">→</span>';
  }else if(d.user&&!d.session){
    showAuthMsg('ok','✅ ¡Cuenta creada! Revisá tu email para confirmar y luego ingresá.');
    btn.disabled=false;btn.innerHTML='Crear cuenta <span class="arrow">→</span>';
  }else if(d.user){
    currentUser=d.user;await cargar();renderApp();
  }
}

async function resetPass(){
  const email=document.getElementById('rst-email')?.value.trim();
  if(!email){showAuthMsg('err','Ingresá tu email.');return;}
  const {error}=await sb.auth.resetPasswordForEmail(email);
  if(error)showAuthMsg('err',error.message);
  else showAuthMsg('ok','✅ Email enviado. Revisá tu bandeja de entrada.');
}

async function logout(){
  await sb.auth.signOut();
  currentUser=null;data={compromisos:[],gastos:[]};
  renderAuth('login');
}

/* ── CALENDARIO ── */
function pagCal(){
  const y=curMonth.getFullYear(),m=curMonth.getMonth();
  const dow=new Date(y,m,1).getDay(),last=new Date(y,m+1,0).getDate();
  const days=[];
  for(let i=0;i<dow;i++)days.push({d:new Date(y,m,-dow+i+1),cur:false});
  for(let d=1;d<=last;d++)days.push({d:new Date(y,m,d),cur:true});
  while(days.length<42)days.push({d:new Date(y,m+1,days.length-last-dow+1),cur:false});
  const hoyS=hoy();
  return `
  <div class="page-header"><div class="page-title">Calendario</div>
    <div style="display:flex;gap:8px"><button class="btn btn-acc" onclick="abrirC()">+ Compromiso</button><button class="btn" onclick="abrirG()">+ Gasto</button></div>
  </div>
  <div class="month-nav" style="margin-bottom:1.5rem">
    <button onclick="chgM(-1)">‹</button>
    <span class="month-lbl">${MESES[m]} ${y}</span>
    <button onclick="chgM(1)">›</button>
  </div>
  <div class="cal-grid">
    ${DIAS.map(d=>`<div class="cal-hdr">${d}</div>`).join('')}
    ${days.map(({d,cur})=>{
      const ds=d.toISOString().split('T')[0];
      const evts=data.compromisos.filter(c=>c.fecha===ds);
      const gsts=data.gastos.filter(g=>g.fecha===ds);
      return `<div class="cal-day ${ds===hoyS?'today':''} ${!cur?'other':''}" onclick="verDia('${ds}')">
        <div class="cal-num">${d.getDate()}</div>
        ${evts.slice(0,2).map(e=>`<div class="cal-ev">${e.hora?e.hora.slice(0,5)+' ':''}${e.titulo}</div>`).join('')}
        ${gsts.slice(0,1).map(g=>`<div class="cal-ev gasto">${CM[g.categoria]?.emoji||'💸'} ${fmt(g.monto)}</div>`).join('')}
      </div>`;
    }).join('')}
  </div>`;}
window.chgM=d=>{curMonth.setMonth(curMonth.getMonth()+d);renderPag();};
window.verDia=function(fecha){
  const evts=data.compromisos.filter(c=>c.fecha===fecha);
  const gsts=data.gastos.filter(g=>g.fecha===fecha);
  const lbl=new Date(fecha+'T12:00:00').toLocaleDateString('es-AR',{weekday:'long',day:'numeric',month:'long'});
  showModal('Día',`<div style="font-size:14px;font-weight:800;margin-bottom:1rem;text-transform:capitalize">${lbl}</div>
    ${evts.length?evts.map(rowC).join(''):'<p style="font-size:13px;color:#bbb">Sin compromisos</p>'}
    ${gsts.length?'<div style="margin-top:1rem">'+gsts.map(rowG).join('')+'</div>':''}
    <div style="display:flex;gap:8px;margin-top:1.5rem">
      <button class="btn btn-acc btn-sm" onclick="cerrar();abrirC('${fecha}')">+ Compromiso</button>
      <button class="btn btn-sm" onclick="cerrar();abrirG('${fecha}')">+ Gasto</button>
    </div>`);};

/* ── GASTOS ── */
function getGF(){
  const h=hoy();
  if(gastoPeriod==='diario')return data.gastos.filter(g=>g.fecha===h);
  if(gastoPeriod==='mensual')return data.gastos.filter(g=>g.fecha.startsWith(`${curMonth.getFullYear()}-${String(curMonth.getMonth()+1).padStart(2,'0')}`));
  return data.gastos.filter(g=>g.fecha.startsWith(String(curYear)));
}
function pLabel(){
  if(gastoPeriod==='diario')return `Hoy — ${new Date().toLocaleDateString('es-AR',{day:'numeric',month:'long'})}`;
  if(gastoPeriod==='mensual')return `${MESES[curMonth.getMonth()]} ${curMonth.getFullYear()}`;
  return `Año ${curYear}`;
}

  const nav=gastoPeriod==='diario'?'':gastoPeriod==='mensual'?
    `<div class="month-nav"><button onclick="chgM(-1);renderPag()">‹</button><span class="month-lbl">${MESES[curMonth.getMonth()]} ${curMonth.getFullYear()}</span><button onclick="chgM(1);renderPag()">›</button></div>`:
    `<div class="month-nav"><button onclick="curYear--;renderPag()">‹</button><span class="month-lbl">Año ${curYear}</span><button onclick="curYear++;renderPag()">›</button></div>`;

    <div class="stat"><div class="stat-lbl">Cantidad</div><div class="stat-val">${gm.length}</div><div class="stat-sub">gastos</div></div>
    <div class="stat"><div class="stat-lbl">Promedio</div><div class="stat-val">${fmt(gm.length?total/gm.length:0)}</div></div>

      <div class="card-hdr"><span class="card-title">Por categoría</span></div>

          </div>
          <div style="text-align:right"><div style="font-size:13px;font-weight:800">${fmt(monto)}</div><div style="font-size:11px;color:#bbb">${total?Math.round(monto/total*100):0}%</div></div>
        </div>`;}).join(''):'<div class="empty" style="padding:1rem"><p>Sin gastos en este período</p></div>'}
      </div>
    </div>
    <div class="card">
      <div class="card-hdr"><span class="card-title">Detalle</span></div>
      <div class="card-body">${gm.length?gm.sort((a,b)=>b.fecha.localeCompare(a.fecha)).map(rowG).join(''):'<div class="empty" style="padding:1rem"><div class="empty-icon">💸</div><p>Sin gastos</p></div>'}</div>
    </div>
  </div>`;}

/* ── RESUMEN ── */
function pagResumen(){
  const ult6=[];
  for(let i=5;i>=0;i--){const d=new Date();d.setMonth(d.getMonth()-i);const k=`${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}`;const t=data.gastos.filter(g=>g.fecha.startsWith(k)).reduce((a,b)=>a+Number(b.monto),0);ult6.push({lbl:MESES[d.getMonth()].slice(0,3),t});}
  const maxB=Math.max(...ult6.map(m=>m.t),1);
  const cats={};data.gastos.forEach(g=>{cats[g.categoria]=(cats[g.categoria]||0)+Number(g.monto);});
  const top=Object.entries(cats).sort((a,b)=>b[1]-a[1]).slice(0,8);
  const tot=data.gastos.reduce((a,b)=>a+Number(b.monto),0);
  const anioA=String(new Date().getFullYear());
  const totA=data.gastos.filter(g=>g.fecha.startsWith(anioA)).reduce((a,b)=>a+Number(b.monto),0);
  const totM=data.gastos.filter(g=>g.fecha.startsWith(hoy().slice(0,7))).reduce((a,b)=>a+Number(b.monto),0);
  return `
  <div class="page-header"><div class="page-title">Resumen financiero</div></div>
  <div class="stats-grid">
    <div class="stat"><div class="stat-lbl">Este mes</div><div class="stat-val" style="color:#dc2626">${fmt(totM)}</div><div class="stat-sub">${MESES[new Date().getMonth()]}</div></div>
    <div class="stat"><div class="stat-lbl">Este año</div><div class="stat-val" style="color:#dc2626">${fmt(totA)}</div><div class="stat-sub">${anioA}</div></div>
    <div class="stat"><div class="stat-lbl">Total histórico</div><div class="stat-val" style="color:#dc2626">${fmt(tot)}</div><div class="stat-sub">${data.gastos.length} gastos</div></div>
  </div>
  <div class="card" style="margin-bottom:1.5rem">
    <div class="card-hdr"><span class="card-title">Últimos 6 meses</span></div>
    <div class="card-body">
      <div style="display:flex;align-items:flex-end;gap:8px;height:150px;padding-top:1rem">
        ${ult6.map(m=>`<div style="flex:1;display:flex;flex-direction:column;align-items:center;gap:5px">
          <div style="font-size:10px;color:#bbb;text-align:center">${m.t?fmt(m.t):''}</div>
          <div style="width:100%;background:#1a1a1a;border-radius:5px 5px 0 0;height:${Math.max(m.t/maxB*115,2)}px"></div>
          <div style="font-size:11px;color:#bbb">${m.lbl}</div>
        </div>`).join('')}
      </div>
    </div>
  </div>
  <div class="card">
    <div class="card-hdr"><span class="card-title">Top categorías</span></div>
    <div class="card-body">
      ${top.map(([cat,monto])=>{const c=CM[cat]||CM.Otro;return `<div class="prog-row">
        <div class="prog-hdr">
          <div style="display:flex;align-items:center;gap:8px">
            <div class="cat-icon" style="width:28px;height:28px;font-size:14px;background:${c.bg}">${c.emoji}</div>
            <span style="font-size:13px;font-weight:700">${cat}</span>
          </div>
          <span style="font-size:13px;font-weight:800">${fmt(monto)}</span>
        </div>
        <div class="prog-bar"><div class="prog-fill" style="width:${Math.round(monto/tot*100)}%"></div></div>
      </div>`;}).join('')}
      ${!top.length?'<div class="empty"><p>Sin datos todavía</p></div>':''}
    </div>
  </div>`;}

/* ── IA ── */
function pagIA(){return `
  <div class="page-header"><div class="page-title">Asistente IA</div></div>
  <div class="ai-box">
    <div class="ai-lbl">✦ Escribí en lenguaje natural — ORDENA interpreta y guarda automáticamente</div>
    <div class="ai-row">
      <input class="ai-inp" type="text" id="ai-in" placeholder='Ej: "Dentista martes a las 10hs" o "Gasté $8.000 en nafta hoy"' onkeydown="if(event.key==='Enter')sendIA()">
      <button class="btn btn-acc" onclick="sendIA()">Enviar</button>
    </div>
    <div class="ai-res" id="ai-res"></div>
  </div>
  <div style="display:grid;grid-template-columns:1fr 1fr;gap:1.5rem">
    ${[['📅 Compromisos',['Dentista martes 29 a las 9hs','Reunión viernes 10am','Cumpleaños mamá el 15/05']],
       ['💸 Gastos',['Gasté 3500 en comida hoy','Pagué alquiler 80000','Nafta 12000 este miércoles']]
    ].map(([tit,ejs])=>`<div class="card"><div class="card-hdr"><span class="card-title">${tit}</span></div><div class="card-body">
      ${ejs.map(e=>`<div onclick="document.getElementById('ai-in').value='${e}'" style="cursor:pointer;font-size:13px;padding:8px 10px;background:#f7f7f5;border-radius:8px;margin-bottom:6px;color:#999;border:1.5px solid #f0f0eb;font-weight:500">"${e}"</div>`).join('')}
    </div></div>`).join('')}
  </div>`;}

async function sendIA(){
  const inp=document.getElementById('ai-in'),res=document.getElementById('ai-res');
  if(!inp?.value.trim())return;
  const txt=inp.value.trim();
  res.style.display='block';res.textContent='⏳ Procesando...';
  try{
    const r=await fetch('https://api.anthropic.com/v1/messages',{method:'POST',
      headers:{'Content-Type':'application/json','anthropic-dangerous-request-direct-browser-access':'true'},
      body:JSON.stringify({model:'claude-sonnet-4-20250514',max_tokens:500,
        system:`Asistente ORDENA. Hoy: ${hoy()}. SOLO JSON sin markdown.
Compromiso: {"accion":"compromiso","titulo":"...","fecha":"YYYY-MM-DD","hora":"HH:MM|null","descripcion":"...|null"}
Gasto: {"accion":"gasto","descripcion":"...","monto":numero,"categoria":"Comida|Nafta|Impuestos|Mutual|Renta|Municipalidad|Alquiler|Servicios|Salud|Educación|Entretenimiento|Transporte|Otro","fecha":"YYYY-MM-DD"}
Consulta: {"accion":"consulta","respuesta":"..."}`,
        messages:[{role:'user',content:txt}]})});
    const d=await r.json();
    const raw=d.content?.[0]?.text||'{}';
    let json;try{json=JSON.parse(raw.replace(/```json|```/g,'').trim());}catch{json={accion:'consulta',respuesta:raw};}
    if(json.accion==='compromiso'){
      const {error}=await sb.from('compromisos').insert({user_id:currentUser.id,titulo:json.titulo,fecha:json.fecha,hora:json.hora,descripcion:json.descripcion,completado:false});
      if(!error){await cargar();res.innerHTML=`✅ <strong>${json.titulo}</strong> — ${fmtD(json.fecha)}${json.hora?' a las '+json.hora:''}`;inp.value='';renderPag();}
      else res.textContent='❌ '+error.message;
    }else if(json.accion==='gasto'){
      const {error}=await sb.from('gastos').insert({user_id:currentUser.id,descripcion:json.descripcion,monto:json.monto,categoria:json.categoria,fecha:json.fecha});
      if(!error){await cargar();res.innerHTML=`✅ <strong>${json.descripcion}</strong> ${fmt(json.monto)} · ${json.categoria}`;inp.value='';renderPag();}
      else res.textContent='❌ '+error.message;
    }else res.textContent=json.respuesta||'No entendí.';
  }catch(e){res.textContent='❌ '+e.message;}
}

/* ── MODALS ── */
function showModal(titulo,body){
  document.getElementById('modal-ov')?.remove();
  const m=document.createElement('div');m.id='modal-ov';m.className='modal-ov';
  m.innerHTML=`<div class="modal"><div class="modal-hdr"><span class="modal-title">${titulo}</span><button class="modal-x" onclick="cerrar()">×</button></div><div class="modal-body">${body}</div></div>`;
  m.onclick=e=>{if(e.target===m)cerrar();};
  document.body.appendChild(m);
}
window.cerrar=()=>document.getElementById('modal-ov')?.remove();

window.abrirC=function(fp=''){
  const c=editing;
  showModal(c?'Editar compromiso':'Nuevo compromiso',`
    <div class="mfg"><label class="mfl">Título *</label><input class="minp" type="text" id="f-tit" value="${c?c.titulo:''}" placeholder="Dentista, Reunión, Pago..."></div>
    <div class="mfrow">
      <div class="mfg"><label class="mfl">Fecha *</label><input class="minp" type="date" id="f-fec" value="${c?c.fecha:fp||hoy()}"></div>
      <div class="mfg"><label class="mfl">Hora</label><input class="minp" type="time" id="f-hora" value="${c&&c.hora?c.hora.slice(0,5):''}"></div>
    </div>
    <div class="mfg"><label class="mfl">Notas</label><input class="minp" type="text" id="f-desc" value="${c?c.descripcion||'':''}" placeholder="Opcional..."></div>
    <button class="btn-submit" onclick="guardarC('${c?c.id:''}')">${c?'Guardar cambios':'Agregar'} <span class="arrow">→</span></button>`);
};
window.guardarC=async function(id=''){
  const t=document.getElementById('f-tit').value.trim();
  const f=document.getElementById('f-fec').value;
  const h=document.getElementById('f-hora').value||null;
  const d=document.getElementById('f-desc').value.trim()||null;
  if(!t||!f){alert('Título y fecha son obligatorios');return;}
  if(id)await sb.from('compromisos').update({titulo:t,fecha:f,hora:h,descripcion:d}).eq('id',id);
  else await sb.from('compromisos').insert({user_id:currentUser.id,titulo:t,fecha:f,hora:h,descripcion:d,completado:false});
  editing=null;cerrar();await cargar();renderPag();
};

window.abrirG=function(fp=''){
  const g=editing;
  const catOpts=CATS.map(c=>`<option value="${c.id}" ${g&&g.categoria===c.id?'selected':''}>${c.emoji} ${c.id}</option>`).join('');
  showModal(g?'Editar gasto':'Nuevo gasto',`
    <div class="mfg"><label class="mfl">Descripción *</label><input class="minp" type="text" id="g-des" value="${g?g.descripcion:''}" placeholder="Super, YPF, Alquiler..."></div>
    <div class="mfrow">
      <div class="mfg"><label class="mfl">Monto *</label><input class="minp" type="number" id="g-mnt" value="${g?g.monto:''}" placeholder="0" min="0" step="1"></div>
      <div class="mfg"><label class="mfl">Fecha *</label><input class="minp" type="date" id="g-fec" value="${g?g.fecha:fp||hoy()}"></div>
    </div>
    <div class="mfg"><label class="mfl">Categoría *</label><select class="minp" id="g-cat">${catOpts}</select></div>
    <button class="btn-submit" onclick="guardarG('${g?g.id:''}')">${g?'Guardar cambios':'Registrar'} <span class="arrow">→</span></button>`);
};
window.guardarG=async function(id=''){
  const d=document.getElementById('g-des').value.trim();
  const m=parseFloat(document.getElementById('g-mnt').value);
  const f=document.getElementById('g-fec').value;
  const c=document.getElementById('g-cat').value;
  if(!d||isNaN(m)||!f){alert('Completá todos los campos');return;}
  if(id)await sb.from('gastos').update({descripcion:d,monto:m,fecha:f,categoria:c}).eq('id',id);
  else await sb.from('gastos').insert({user_id:currentUser.id,descripcion:d,monto:m,fecha:f,categoria:c});
  editing=null;cerrar();await cargar();renderPag();
};

window.editC=id=>{editing=data.compromisos.find(c=>c.id===id);cerrar();abrirC();};
window.editG=id=>{editing=data.gastos.find(g=>g.id===id);cerrar();abrirG();};
window.completar=async id=>{await sb.from('compromisos').update({completado:true}).eq('id',id);await cargar();renderPag();};
window.borrar=async function(tabla,id){if(!confirm('¿Eliminar este registro?'))return;await sb.from(tabla).delete().eq('id',id);await cargar();renderPag();};

/* ── INIT ── */
(async()=>{
  const {data:{session}}=await sb.auth.getSession();
  if(session?.user){currentUser=session.user;await cargar();renderApp();}
  else renderAuth('login');
  sb.auth.onAuthStateChange((event)=>{if(event==='SIGNED_OUT'){currentUser=null;renderAuth('login');}});
})();
</script>
