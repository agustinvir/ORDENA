<style>
:root{
  --bg:#0e0e0e;--bg2:#161616;--bg3:#1e1e1e;--surface:#242424;--border:#2a2a2a;
  --accent:#c8f04a;--text:#f0f0ed;--text2:#888;--text3:#444;
  --red:#ff4d4d;--red-bg:#2a1010;--green:#4ade80;--green-bg:#0f2a1a;
  --radius:14px;--radius-sm:9px;--tab-h:68px;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
body{font-family:'DM Sans',system-ui,sans-serif;background:var(--bg);color:var(--text);min-height:100vh;max-width:430px;margin:0 auto;overflow-x:hidden;}
::-webkit-scrollbar{width:0;}

/* AUTH */
.auth-screen{min-height:100vh;display:flex;flex-direction:column;}
.auth-hero{background:linear-gradient(160deg,#1a1a1a 0%,var(--bg) 100%);padding:60px 28px 32px;padding-top:calc(60px + env(safe-area-inset-top, 44px));position:relative;overflow:hidden;}
.auth-hero::before{content:'';position:absolute;width:280px;height:280px;border-radius:50%;background:radial-gradient(circle,rgba(200,240,74,0.12) 0%,transparent 70%);top:-60px;right:-60px;pointer-events:none;}
.auth-logo{font-family:'Sora',sans-serif;font-size:44px;font-weight:900;letter-spacing:-2px;color:var(--text);line-height:1;}
.auth-logo span{color:var(--accent);}
.auth-tagline{font-size:14px;color:var(--text3);margin-top:8px;line-height:1.5;}
.auth-body{flex:1;padding:24px 20px 40px;}
.auth-tabs{display:flex;background:var(--bg3);border-radius:12px;padding:4px;margin-bottom:24px;}
.auth-tab{flex:1;text-align:center;padding:10px;border-radius:9px;cursor:pointer;font-size:14px;color:var(--text3);border:none;background:none;font-family:inherit;font-weight:700;transition:all 0.2s;}
.auth-tab.active{background:var(--accent);color:#0e0e0e;}
.auth-title{font-family:'Sora',sans-serif;font-size:22px;font-weight:800;margin-bottom:4px;}
.auth-sub{font-size:13px;color:var(--text3);margin-bottom:20px;}
.fg{display:flex;flex-direction:column;gap:5px;margin-bottom:14px;}
.fl{font-size:11px;color:var(--text2);font-weight:700;letter-spacing:0.07em;text-transform:uppercase;}
.input-wrap{position:relative;display:flex;align-items:center;}
.iico{position:absolute;left:13px;font-size:15px;pointer-events:none;}
.inp{border:1.5px solid var(--border);border-radius:var(--radius-sm);padding:13px 44px;font-size:15px;font-family:inherit;width:100%;background:var(--bg3);color:var(--text);outline:none;transition:all 0.15s;-webkit-appearance:none;}
.inp:focus{border-color:var(--accent);}
.inp.noi{padding-left:14px;}
.eye{position:absolute;right:12px;background:none;border:none;cursor:pointer;font-size:15px;color:var(--text3);}
.frow2{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
.pw-bars{display:flex;gap:4px;margin:8px 0 4px;}
.pw-bar{height:4px;flex:1;border-radius:99px;background:var(--border);transition:background 0.2s;}
.pw-bar.s1{background:#ef4444;}.pw-bar.s2{background:#f97316;}.pw-bar.s3{background:#eab308;}.pw-bar.s4{background:#22c55e;}
.pw-rules{display:flex;flex-direction:column;gap:3px;margin-top:4px;}
.pw-rule{font-size:11px;color:var(--text3);display:flex;align-items:center;gap:5px;}
.pw-rule::before{content:'○';font-size:9px;}
.pw-rule.ok{color:var(--green);}
.pw-rule.ok::before{content:'●';}
.pw-lbl{font-size:11px;font-weight:700;color:var(--text3);}
.btn-main{background:var(--accent);color:#0e0e0e;border:none;border-radius:var(--radius-sm);padding:15px;font-size:16px;font-weight:800;cursor:pointer;width:100%;font-family:'Sora',inherit;transition:all 0.15s;margin-top:4px;display:flex;align-items:center;justify-content:center;gap:6px;}
.btn-main:active{transform:scale(0.98);}
.btn-main:disabled{background:var(--bg3);color:var(--text3);cursor:not-allowed;}
.btn-sec{background:var(--bg3);color:var(--text2);border:none;border-radius:var(--radius-sm);padding:13px;font-size:14px;font-weight:700;cursor:pointer;width:100%;font-family:inherit;margin-top:10px;}
.auth-msg{font-size:13px;padding:12px 14px;border-radius:var(--radius-sm);margin-bottom:14px;display:none;font-weight:600;}
.auth-msg.err{background:var(--red-bg);color:var(--red);}
.auth-msg.ok{background:var(--green-bg);color:var(--green);}
.forgot{text-align:right;font-size:12px;margin-top:-8px;margin-bottom:14px;}
.forgot a{color:var(--text3);font-weight:700;cursor:pointer;}

/* APP */
.app{display:flex;flex-direction:column;min-height:100vh;}
.topbar{position:sticky;top:0;z-index:100;background:rgba(14,14,14,0.92);backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px);padding:14px 20px;padding-top:calc(14px + env(safe-area-inset-top, 44px));border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;}
.topbar-logo{font-family:'Sora',sans-serif;font-size:20px;font-weight:900;letter-spacing:-1px;}
.topbar-logo span{color:var(--accent);}
.topbar-right{display:flex;align-items:center;gap:8px;}
.topbar-user{font-size:11px;color:var(--text3);}
.main-content{flex:1;padding:20px 16px;padding-bottom:calc(var(--tab-h) + 20px);}
.tabbar{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:430px;background:rgba(14,14,14,0.96);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);border-top:1px solid var(--border);display:flex;z-index:200;}
.tab-btn{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:3px;padding:10px 4px 8px;border:none;background:none;cursor:pointer;font-family:inherit;color:var(--text3);transition:color 0.15s;min-height:var(--tab-h);position:relative;}
.tab-btn.active{color:var(--accent);}
.tab-icon{font-size:21px;line-height:1;}
.tab-label{font-size:10px;font-weight:700;}
.tab-dot{width:5px;height:5px;background:var(--accent);border-radius:50%;position:absolute;top:7px;right:calc(50% - 14px);}
.fab{position:fixed;bottom:calc(var(--tab-h) + 14px);right:18px;width:54px;height:54px;background:var(--accent);color:#0e0e0e;border:none;border-radius:50%;font-size:26px;font-weight:900;cursor:pointer;display:flex;align-items:center;justify-content:center;box-shadow:0 4px 20px rgba(200,240,74,0.3);z-index:150;transition:all 0.15s;}
.fab:active{transform:scale(0.92);}
.page{animation:fadeIn 0.18s ease;}

.page-title{font-family:'Sora',sans-serif;font-size:24px;font-weight:900;letter-spacing:-0.5px;}
.page-sub{font-size:13px;color:var(--text3);margin-top:2px;}
.page-hdr-row{display:flex;align-items:flex-start;justify-content:space-between;}

.stat-val{font-family:'Sora',sans-serif;font-size:18px;font-weight:800;letter-spacing:-0.5px;}
.stat-sub{font-size:10px;color:var(--text3);margin-top:2px;}
.card{background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius);overflow:hidden;margin-bottom:12px;}
.card-hdr{padding:14px 16px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;}
.card-title{font-size:14px;font-weight:800;font-family:'Sora',sans-serif;}
.card-body{padding:0 16px;}
.item{display:flex;align-items:center;gap:12px;padding:12px 0;border-bottom:1px solid var(--border);}
.item:last-child{border-bottom:none;}
.cat-icon{border-radius:10px;display:flex;align-items:center;justify-content:center;flex-shrink:0;}

.modal{background:var(--bg2);border-radius:20px 20px 0 0;width:100%;max-height:92vh;overflow-y:auto;padding-bottom:30px;animation:slideUp 0.25s ease;}

.mfg{display:flex;flex-direction:column;gap:6px;}
.mfl{font-size:11px;color:var(--text2);font-weight:700;text-transform:uppercase;letter-spacing:0.06em;}
.minp{border:1.5px solid var(--border);border-radius:var(--radius-sm);padding:13px 14px;font-size:15px;font-family:inherit;width:100%;background:var(--bg3);color:var(--text);outline:none;transition:all 0.15s;-webkit-appearance:none;}

.mfrow{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
.period-sw{display:flex;background:var(--bg3);border-radius:10px;padding:3px;margin-bottom:14px;}
.period-btn{flex:1;text-align:center;padding:8px;border-radius:8px;font-size:13px;color:var(--text3);border:none;background:none;font-family:inherit;font-weight:700;cursor:pointer;}

.month-nav{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px;background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius);padding:12px 16px;}

.month-lbl{font-family:'Sora',sans-serif;font-size:15px;font-weight:800;}
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:3px;}
.cal-hdr{text-align:center;font-size:11px;color:var(--text3);padding:5px 2px;font-weight:700;}
.cal-day{min-height:52px;border-radius:8px;padding:5px 4px;background:var(--bg2);cursor:pointer;border:1px solid transparent;}

.cal-ev.gasto{background:#2a1f0a;color:#fbbf24;}
.ai-box{background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius);padding:16px;margin-bottom:14px;}
.ai-lbl{font-size:12px;color:var(--text3);margin-bottom:10px;font-weight:700;}
.ai-row{display:flex;gap:8px;}
.ai-inp{flex:1;border:1.5px solid var(--border);border-radius:var(--radius-sm);padding:12px 14px;font-size:14px;font-family:inherit;background:var(--bg3);color:var(--text);outline:none;-webkit-appearance:none;}

.empty-icon{font-size:36px;margin-bottom:10px;}
.empty p{font-size:14px;font-weight:600;}
.cat-row{display:flex;align-items:center;gap:12px;padding:12px 0;border-bottom:1px solid var(--border);}
.cat-row:last-child{border-bottom:none;}
.cat-info{flex:1;}
.cat-name{font-size:13px;font-weight:700;}
.cat-bar{height:4px;background:var(--border);border-radius:99px;margin-top:5px;overflow:hidden;}
.cat-bar-fill{height:100%;background:var(--accent);border-radius:99px;}
.prog-row{margin-bottom:12px;}
.prog-hdr{display:flex;justify-content:space-between;align-items:center;margin-bottom:5px;}
.prog-bar{height:6px;background:var(--border);border-radius:99px;overflow:hidden;}

</style>

async function cargar() {

/* PASSWORD */
function checkPw(pw) {
  return { len: pw.length >= 8, upper: /[A-Z]/.test(pw), num: /[0-9]/.test(pw) };
}
function pwScore(pw) {
  var r = checkPw(pw);
  return (r.len ? 1 : 0) + (r.upper ? 1 : 0) + (r.num ? 1 : 0);
}
function updatePwUI(pw, prefix) {
  var score = pwScore(pw);
  var r = checkPw(pw);
  var bars = document.querySelectorAll('#' + prefix + '-bars .pw-bar');
  var scoreClass = ['', 's1', 's2', 's3', 's4'];
  bars.forEach(function(b, i) {
    b.className = 'pw-bar';
    if (i < score) b.classList.add(scoreClass[score] || 's4');
  });
  var lblMap = ['', 'Debil', 'Regular', 'Buena', 'Fuerte'];
  var lbl = document.getElementById(prefix + '-lbl');
  if (lbl) lbl.textContent = pw ? (lblMap[score] || '') : '';
  var rules = [
    { id: prefix + '-r1', ok: r.len },
    { id: prefix + '-r2', ok: r.upper },
    { id: prefix + '-r3', ok: r.num }
  ];
  rules.forEach(function(rule) {
    var el = document.getElementById(rule.id);
    if (el) el.classList.toggle('ok', rule.ok);
  });
}

/* AUTH */
function showAuthMsg(tipo, txt) {
  var err = document.getElementById('auth-err');
  var ok  = document.getElementById('auth-ok');
  if (err) err.style.display = 'none';
  if (ok)  ok.style.display  = 'none';
  var el = tipo === 'err' ? err : ok;
  if (el) { el.textContent = txt; el.style.display = 'block'; }
}

function toggleEye(id, btn) {
  var inp = document.getElementById(id);
  if (!inp) return;
  inp.type = inp.type === 'password' ? 'text' : 'password';
  btn.textContent = inp.type === 'password' ? '👁️' : '🙈';
}

function renderAuth(tab) {
  tab = tab || 'login';
  document.getElementById('root').innerHTML =
    '<div class="auth-screen">' +
      '<div class="auth-hero">' +
        '<div class="auth-logo">ORDEN<span>A</span></div>' +
        '<div class="auth-tagline">Organizá tu vida y tus finanzas,<br>todo en un lugar.</div>' +
      '</div>' +
      '<div class="auth-body">' +
        '<div class="auth-tabs">' +
          '<button class="auth-tab ' + (tab === 'login' ? 'active' : '') + '" onclick="renderAuth(\'login\')">Ingresar</button>' +
          '<button class="auth-tab ' + (tab === 'reg' ? 'active' : '') + '" onclick="renderAuth(\'reg\')">Crear cuenta</button>' +
        '</div>' +

async function login() {
  var email = document.getElementById('l-em') ? document.getElementById('l-em').value.trim() : '';
  var pass  = document.getElementById('l-pw')  ? document.getElementById('l-pw').value : '';
  var btn   = document.getElementById('btn-login');
  if (!email || !pass) { showAuthMsg('err', 'Completa email y contrasena.'); return; }
  btn.disabled = true; btn.textContent = 'Ingresando...';
  var res = await sb.auth.signInWithPassword({ email: email, password: pass });
  if (res.error) {
    showAuthMsg('err', res.error.message.indexOf('Invalid') >= 0 ? 'Email o contrasena incorrectos' : res.error.message);
    btn.disabled = false; btn.textContent = 'Ingresar →';
  } else {
    currentUser = res.data.user; await cargar(); renderApp();
  }
}

async function registro() {
  var nom   = document.getElementById('r-nom') ? document.getElementById('r-nom').value.trim() : '';
  var ape   = document.getElementById('r-ape') ? document.getElementById('r-ape').value.trim() : '';
  var email = document.getElementById('r-em')  ? document.getElementById('r-em').value.trim()  : '';
  var pass  = document.getElementById('r-pw')  ? document.getElementById('r-pw').value : '';
  var btn   = document.getElementById('btn-reg');
  if (!nom || !ape || !email || !pass) { showAuthMsg('err', 'Completa todos los campos.'); return; }
  var r = checkPw(pass);
  if (!r.len)   { showAuthMsg('err', 'La contrasena debe tener al menos 8 caracteres.'); return; }
  if (!r.upper) { showAuthMsg('err', 'Necesitas al menos una letra mayuscula.'); return; }
  if (!r.num)   { showAuthMsg('err', 'Necesitas al menos un numero.'); return; }
  btn.disabled = true; btn.textContent = 'Creando cuenta...';
  var res = await sb.auth.signUp({ email: email, password: pass, options: { data: { full_name: nom + ' ' + ape, nombre: nom, apellido: ape } } });
  if (res.error) {
    showAuthMsg('err', res.error.message); btn.disabled = false; btn.textContent = 'Crear cuenta →';
  } else if (res.data.user && !res.data.session) {
    showAuthMsg('ok', 'Cuenta creada! Revisa tu email para confirmar y luego ingresa.');
    btn.disabled = false; btn.textContent = 'Crear cuenta →';
  } else if (res.data.user) {
    currentUser = res.data.user; await cargar(); renderApp();
  }
}

async function resetPass() {
  var email = document.getElementById('rst-em') ? document.getElementById('rst-em').value.trim() : '';
  if (!email) { showAuthMsg('err', 'Ingresa tu email.'); return; }
  var res = await sb.auth.resetPasswordForEmail(email);
  if (res.error) showAuthMsg('err', res.error.message);
  else showAuthMsg('ok', 'Email enviado. Revisa tu bandeja de entrada.');
}

async function logout() {
  await sb.auth.signOut();
  currentUser = null; data = { compromisos: [], gastos: [] };
  renderAuth('login');
}

/* APP */
function renderApp() {
  var h = hoy();
  var hoyEvts = data.compromisos.filter(function(c) { return c.fecha === h && !c.completado; }).length;
  var meta = currentUser && currentUser.user_metadata ? currentUser.user_metadata : {};
  var nombre = meta.nombre || (meta.full_name ? meta.full_name.split(' ')[0] : '') || '';
  var tabs = [
    {id:'inicio',  icon:'🏠', label:'Inicio'},
    {id:'agenda',  icon:'📅', label:'Agenda'},
    {id:'gastos',  icon:'💸', label:'Gastos'},
    {id:'resumen', icon:'📊', label:'Resumen'},
    {id:'ia',      icon:'✦',  label:'IA'}
  ];
  var tabsHtml = tabs.map(function(t) {
    return '<button class="tab-btn ' + (page === t.id ? 'active' : '') + '" onclick="ir(\'' + t.id + '\')">' +
      '<span class="tab-icon">' + t.icon + '</span>' +
      '<span class="tab-label">' + t.label + '</span>' +
      (t.id === 'agenda' && hoyEvts > 0 ? '<span class="tab-dot"></span>' : '') +
    '</button>';
  }).join('');
  var showFab = ['inicio','agenda','gastos'].indexOf(page) >= 0;
  document.getElementById('root').innerHTML =
    '<div class="app">' +
      '<div class="topbar">' +
        '<div class="topbar-logo">ORDEN<span>A</span></div>' +
        '<div class="topbar-right">' +
          '<span class="topbar-user">👤 ' + nombre + '</span>' +
          '<button class="btn btn-sm" onclick="logout()">Salir</button>' +
        '</div>' +
      '</div>' +
      '<div class="main-content" id="mc"></div>' +
      '<div class="tabbar">' + tabsHtml + '</div>' +
      (showFab ? '<button class="fab" onclick="fabAction()">+</button>' : '') +
    '</div>';
  renderPag();
}

function ir(p) { page = p; renderApp(); }
function fabAction() { if (page === 'gastos') abrirG(); else abrirC(); }

function renderPag() {
  var el = document.getElementById('mc');
  if (!el) return;
  var map = { inicio: pagInicio, agenda: pagAgenda, gastos: pagGastos, resumen: pagResumen, ia: pagIA };
  var fn = map[page] || pagInicio;
  el.innerHTML = '<div class="page">' + fn() + '</div>';
}

/* INICIO */
function pagInicio() {
  var h = hoy();
  var mesK = h.slice(0, 7);
  var anioK = h.slice(0, 4);
  var nom = currentUser && currentUser.user_metadata && currentUser.user_metadata.nombre
    ? currentUser.user_metadata.nombre.split(' ')[0] : '';
  var proximos = data.compromisos.filter(function(c) { return c.fecha >= h && !c.completado; }).slice(0, 3);
  var gastosH = data.gastos.filter(function(g) { return g.fecha === h; }).reduce(function(a,b) { return a + Number(b.monto); }, 0);
  var gastosMes = data.gastos.filter(function(g) { return g.fecha.indexOf(mesK) === 0; }).reduce(function(a,b) { return a + Number(b.monto); }, 0);
  var gastosAnio = data.gastos.filter(function(g) { return g.fecha.indexOf(anioK) === 0; }).reduce(function(a,b) { return a + Number(b.monto); }, 0);
  var ultimosG = data.gastos.slice(0, 3);
  var hora = new Date().getHours();
  var saludo = hora < 12 ? 'Buenos dias' : (hora < 18 ? 'Buenas tardes' : 'Buenas noches');
  var html = '<div class="page-hdr">' +
    '<div class="page-title">' + saludo + (nom ? ', ' + nom : '') + '!</div>' +
    '<div class="page-sub">' + new Date().toLocaleDateString('es-AR', {weekday:'long',day:'numeric',month:'long'}) + '</div>' +
  '</div>' +
  '<div class="stats-row three">' +
    '<div class="stat"><div class="stat-lbl">Hoy</div><div class="stat-val" style="color:var(--red)">' + fmt(gastosH) + '</div></div>' +
    '<div class="stat"><div class="stat-lbl">Este mes</div><div class="stat-val" style="color:var(--red)">' + fmt(gastosMes) + '</div></div>' +
    '<div class="stat"><div class="stat-lbl">Este año</div><div class="stat-val" style="color:var(--red)">' + fmt(gastosAnio) + '</div></div>' +
  '</div>';
  if (proximos.length) {
    html += '<div class="card"><div class="card-hdr"><span class="card-title">Proximos eventos</span><button class="btn btn-sm" onclick="ir(\'agenda\')">Ver todos</button></div><div class="card-body">' + proximos.map(rowC).join('') + '</div></div>';
  }
  if (ultimosG.length) {
    html += '<div class="card"><div class="card-hdr"><span class="card-title">Ultimos gastos</span><button class="btn btn-sm" onclick="ir(\'gastos\')">Ver todos</button></div><div class="card-body">' + ultimosG.map(rowG).join('') + '</div></div>';
  }
  if (!proximos.length && !ultimosG.length) {
    html += '<div class="empty"><div class="empty-icon">✨</div><p>Todo listo para empezar!</p></div>';
  }
  return html;
}

function rowC(c) {
  return '<div class="item">' +
    '<div style="width:10px;height:10px;border-radius:50%;flex-shrink:0;margin-top:2px;background:' + (c.completado ? 'var(--border)' : 'var(--accent)') + '"></div>' +
    '<div class="item-info">' +
      '<div class="item-title" style="' + (c.completado ? 'opacity:0.3;text-decoration:line-through' : '') + '">' + c.titulo + '</div>' +
      '<div class="item-meta">' + fmtD(c.fecha) + (c.hora ? ' · ' + c.hora.slice(0,5) : '') + (c.descripcion ? ' · ' + c.descripcion : '') + '</div>' +

      (!c.completado ? '<button class="btn btn-sm" onclick="completar(\'' + c.id + '\')">✓</button>' : '') +
      '<button class="btn btn-sm" onclick="editC(\'' + c.id + '\')">✎</button>' +

/* AGENDA */
function pagAgenda() {
  var h = hoy();
  var y = curMonth.getFullYear();
  var m = curMonth.getMonth();
  var dow = new Date(y, m, 1).getDay();
  var last = new Date(y, m+1, 0).getDate();
  var days = [];
  for (var i = 0; i < dow; i++) days.push({ d: new Date(y, m, -dow+i+1), cur: false });
  for (var d = 1; d <= last; d++) days.push({ d: new Date(y, m, d), cur: true });
  while (days.length < 35) days.push({ d: new Date(y, m+1, days.length - last - dow + 1), cur: false });
  var pend = data.compromisos.filter(function(c) { return !c.completado && c.fecha >= h; })
    .sort(function(a,b) { return a.fecha.localeCompare(b.fecha); }).slice(0, 5);
  var calCells = days.map(function(item) {
    var ds = item.d.toISOString().split('T')[0];
    var evts = data.compromisos.filter(function(c) { return c.fecha === ds; });
    var gsts = data.gastos.filter(function(g) { return g.fecha === ds; });
    return '<div class="cal-day ' + (ds === h ? 'today' : '') + ' ' + (!item.cur ? 'other' : '') + '" onclick="verDia(\'' + ds + '\')">' +
      '<div class="cal-num">' + item.d.getDate() + '</div>' +
      (evts.length ? '<div class="cal-ev">' + evts[0].titulo.slice(0,8) + '</div>' : '') +
      (gsts.length ? '<div class="cal-ev gasto">' + fmt(gsts[0].monto) + '</div>' : '') +
    '</div>';
  }).join('');
  return '<div class="page-hdr"><div class="page-title">Agenda</div></div>' +
    '<div class="month-nav">' +
      '<button onclick="chgM(-1)">‹</button>' +
      '<span class="month-lbl">' + MESES[m] + ' ' + y + '</span>' +
      '<button onclick="chgM(1)">›</button>' +
    '</div>' +
    '<div class="cal-grid" style="margin-bottom:18px">' +
      DIAS.map(function(d) { return '<div class="cal-hdr">' + d + '</div>'; }).join('') +
      calCells +
    '</div>' +
    '<div class="card">' +
      '<div class="card-hdr"><span class="card-title">Proximos</span>' +
        '<div class="seg">' +
          '<button class="btn btn-sm" onclick="tabComp(this,\'pend\')">Pendientes</button>' +
          '<button class="btn btn-sm" onclick="tabComp(this,\'comp\')">Hechos</button>' +
        '</div>' +
      '</div>' +
      '<div class="card-body" id="clist">' + (pend.length ? pend.map(rowC).join('') : '<div class="empty" style="padding:24px 0"><div class="empty-icon">🎉</div><p>Todo al dia!</p></div>') + '</div>' +
    '</div>';
}

window.chgM = function(d) { curMonth.setMonth(curMonth.getMonth() + d); renderPag(); };

window.tabComp = function(btn, tipo) {
  var h = hoy();
  var items = tipo === 'pend'
    ? data.compromisos.filter(function(c) { return !c.completado && c.fecha >= h; }).sort(function(a,b) { return a.fecha.localeCompare(b.fecha); })
    : data.compromisos.filter(function(c) { return c.completado; }).slice(0, 20);
  var el = document.getElementById('clist');
  if (el) el.innerHTML = items.length ? items.map(rowC).join('') : '<div class="empty" style="padding:24px 0"><div class="empty-icon">📭</div><p>Nada aqui</p></div>';
};

window.verDia = function(fecha) {
  var evts = data.compromisos.filter(function(c) { return c.fecha === fecha; });
  var gsts = data.gastos.filter(function(g) { return g.fecha === fecha; });
  var lbl = new Date(fecha+'T12:00:00').toLocaleDateString('es-AR', {weekday:'long',day:'numeric',month:'long'});
  var body = '<div style="font-size:15px;font-weight:800;margin-bottom:12px;text-transform:capitalize;font-family:Sora,sans-serif">' + lbl + '</div>';
  body += evts.length ? evts.map(rowC).join('') : '<p style="font-size:13px;color:var(--text3)">Sin compromisos</p>';
  if (gsts.length) body += '<div style="margin-top:12px">' + gsts.map(rowG).join('') + '</div>';
  body += '<div style="display:flex;gap:8px;margin-top:16px"><button class="btn btn-acc" onclick="cerrar();abrirC(\'' + fecha + '\')">+ Compromiso</button><button class="btn" onclick="cerrar();abrirG(\'' + fecha + '\')">+ Gasto</button></div>';
  showModal('Dia', body);
};

/* GASTOS */
function getGF() {
  var h = hoy();
  var mesK = curMonth.getFullYear() + '-' + String(curMonth.getMonth() + 1).padStart(2, '0');
  if (gastoPeriod === 'diario')  return data.gastos.filter(function(g) { return g.fecha === h; });
  if (gastoPeriod === 'mensual') return data.gastos.filter(function(g) { return g.fecha.indexOf(mesK) === 0; });
  return data.gastos.filter(function(g) { return g.fecha.indexOf(String(curYear)) === 0; });
}
function pLabel() {
  if (gastoPeriod === 'diario')  return 'Hoy';
  if (gastoPeriod === 'mensual') return MESES[curMonth.getMonth()] + ' ' + curMonth.getFullYear();
  return 'Ano ' + curYear;
}

function pagGastos() {
  var gm = getGF();
  var total = gm.reduce(function(a,b) { return a + Number(b.monto); }, 0);
  var porCat = {};
  gm.forEach(function(g) { porCat[g.categoria] = (porCat[g.categoria] || 0) + Number(g.monto); });
  var catList = Object.entries(porCat).sort(function(a,b) { return b[1] - a[1]; });
  var nav = '';
  if (gastoPeriod === 'mensual') {
    nav = '<div class="month-nav"><button onclick="chgM(-1);renderPag()">‹</button><span class="month-lbl">' + MESES[curMonth.getMonth()] + ' ' + curMonth.getFullYear() + '</span><button onclick="chgM(1);renderPag()">›</button></div>';
  } else if (gastoPeriod === 'anual') {
    nav = '<div class="month-nav"><button onclick="curYear--;renderPag()">‹</button><span class="month-lbl">Ano ' + curYear + '</span><button onclick="curYear++;renderPag()">›</button></div>';
  }
  var catsHtml = catList.length ? catList.map(function(item) {
    var cat = item[0]; var monto = item[1];
    var c = CM[cat] || CM['Otro'];
    return '<div class="cat-row">' +
      '<div class="cat-icon" style="width:34px;height:34px;font-size:17px;background:' + c.bg + ';border-radius:9px">' + c.emoji + '</div>' +
      '<div class="cat-info"><div class="cat-name">' + cat + '</div>' +
        '<div class="cat-bar"><div class="cat-bar-fill" style="width:' + (total ? Math.round(monto/total*100) : 0) + '%"></div></div>' +
      '</div>' +
      '<div style="text-align:right;flex-shrink:0">' +
        '<div style="font-family:Sora,sans-serif;font-size:14px;font-weight:800">' + fmt(monto) + '</div>' +
        '<div style="font-size:11px;color:var(--text3)">' + (total ? Math.round(monto/total*100) : 0) + '%</div>' +
      '</div></div>';
  }).join('') : '<div class="empty" style="padding:20px 0"><p>Sin gastos en este periodo</p></div>';
  var detHtml = gm.length
    ? gm.slice().sort(function(a,b) { return b.fecha.localeCompare(a.fecha); }).map(rowG).join('')
    : '<div class="empty" style="padding:20px 0"><div class="empty-icon">💸</div><p>Sin gastos</p></div>';
  return '<div class="page-hdr page-hdr-row">' +
    '<div><div class="page-title">Gastos</div><div class="page-sub">' + pLabel() + ' · ' + fmt(total) + '</div></div>' +
  '</div>' +
  '<div class="period-sw">' +
    '<button class="period-btn ' + (gastoPeriod === 'diario' ? 'active' : '') + '" onclick="gastoPeriod=\'diario\';renderPag()">Hoy</button>' +
    '<button class="period-btn ' + (gastoPeriod === 'mensual' ? 'active' : '') + '" onclick="gastoPeriod=\'mensual\';renderPag()">Mensual</button>' +
    '<button class="period-btn ' + (gastoPeriod === 'anual' ? 'active' : '') + '" onclick="gastoPeriod=\'anual\';renderPag()">Anual</button>' +
  '</div>' + nav +
  '<div class="stats-row">' +
    '<div class="stat"><div class="stat-lbl">Total</div><div class="stat-val" style="color:var(--red)">' + fmt(total) + '</div><div class="stat-sub">' + gm.length + ' gastos</div></div>' +
    '<div class="stat"><div class="stat-lbl">Promedio</div><div class="stat-val">' + fmt(gm.length ? total/gm.length : 0) + '</div></div>' +
  '</div>' +
  '<div class="card"><div class="card-hdr"><span class="card-title">Por categoria</span></div><div class="card-body">' + catsHtml + '</div></div>' +
  '<div class="card"><div class="card-hdr"><span class="card-title">Detalle</span></div><div class="card-body">' + detHtml + '</div></div>';
}

/* RESUMEN */
function pagResumen() {
  var ult6 = [];
  for (var i = 5; i >= 0; i--) {
    var d = new Date(); d.setMonth(d.getMonth() - i);
    var k = d.getFullYear() + '-' + String(d.getMonth()+1).padStart(2,'0');
    var t = data.gastos.filter(function(g) { return g.fecha.indexOf(k) === 0; }).reduce(function(a,b) { return a + Number(b.monto); }, 0);
    ult6.push({ lbl: MESES[d.getMonth()].slice(0,3), t: t });
  }
  var maxB = Math.max.apply(null, ult6.map(function(m) { return m.t; }).concat([1]));
  var cats = {};
  data.gastos.forEach(function(g) { cats[g.categoria] = (cats[g.categoria] || 0) + Number(g.monto); });
  var top = Object.entries(cats).sort(function(a,b) { return b[1]-a[1]; }).slice(0,6);
  var tot = data.gastos.reduce(function(a,b) { return a + Number(b.monto); }, 0);
  var anioA = String(new Date().getFullYear());
  var totA = data.gastos.filter(function(g) { return g.fecha.indexOf(anioA) === 0; }).reduce(function(a,b) { return a + Number(b.monto); }, 0);
  var totM = data.gastos.filter(function(g) { return g.fecha.indexOf(hoy().slice(0,7)) === 0; }).reduce(function(a,b) { return a + Number(b.monto); }, 0);
  var barsHtml = ult6.map(function(m) {
    return '<div style="flex:1;display:flex;flex-direction:column;align-items:center;gap:4px">' +
      '<div style="font-size:9px;color:var(--text3);text-align:center">' + (m.t ? fmt(m.t) : '') + '</div>' +
      '<div style="width:100%;background:var(--accent);border-radius:5px 5px 0 0;height:' + Math.max(m.t/maxB*90,2) + 'px;opacity:0.85"></div>' +
      '<div style="font-size:10px;color:var(--text3)">' + m.lbl + '</div>' +
    '</div>';
  }).join('');
  var topHtml = top.length ? top.map(function(item) {
    var cat = item[0]; var monto = item[1];
    var c = CM[cat] || CM['Otro'];
    return '<div class="prog-row">' +
      '<div class="prog-hdr">' +
        '<div style="display:flex;align-items:center;gap:8px">' +
          '<div class="cat-icon" style="width:26px;height:26px;font-size:13px;background:' + c.bg + ';border-radius:7px">' + c.emoji + '</div>' +
          '<span style="font-size:13px;font-weight:700">' + cat + '</span>' +
        '</div>' +
        '<span style="font-family:Sora,sans-serif;font-size:13px;font-weight:800">' + fmt(monto) + '</span>' +
      '</div>' +
      '<div class="prog-bar"><div class="prog-fill" style="width:' + Math.round(monto/tot*100) + '%"></div></div>' +
    '</div>';
  }).join('') : '<div class="empty" style="padding:24px 0"><p>Sin datos todavia</p></div>';
  return '<div class="page-hdr"><div class="page-title">Resumen</div></div>' +
    '<div class="stats-row">' +
      '<div class="stat"><div class="stat-lbl">Este mes</div><div class="stat-val" style="color:var(--red)">' + fmt(totM) + '</div><div class="stat-sub">' + MESES[new Date().getMonth()] + '</div></div>' +
      '<div class="stat"><div class="stat-lbl">Este año</div><div class="stat-val" style="color:var(--red)">' + fmt(totA) + '</div><div class="stat-sub">' + anioA + '</div></div>' +
    '</div>' +
    '<div class="stat" style="margin-bottom:14px"><div class="stat-lbl">Total historico</div><div class="stat-val" style="color:var(--red)">' + fmt(tot) + '</div><div class="stat-sub">' + data.gastos.length + ' gastos registrados</div></div>' +
    '<div class="card" style="margin-bottom:12px"><div class="card-hdr"><span class="card-title">Ultimos 6 meses</span></div>' +
      '<div class="card-body" style="padding:16px"><div style="display:flex;align-items:flex-end;gap:6px;height:110px">' + barsHtml + '</div></div>' +
    '</div>' +
    '<div class="card"><div class="card-hdr"><span class="card-title">Top categorias</span></div><div class="card-body">' + topHtml + '</div></div>';
}

/* IA */
function pagIA() {
  var ejemplos = [
    'Dentista martes 29 a las 9hs',
    'Gaste 3500 en comida hoy',
    'Pague alquiler 80000',
    'Reunion viernes 10am',
    'Nafta 12000 este miercoles',
    'Cumpleanos mama el 15/05'
  ];
  var ejHtml = ejemplos.map(function(e) {
    return '<div class="example-item" onclick="document.getElementById(\'ai-in\').value=\'' + e + '\'">"' + e + '"</div>';
  }).join('');
  return '<div class="page-hdr"><div class="page-title">Asistente IA</div><div class="page-sub">Escribi en lenguaje natural</div></div>' +
    '<div class="ai-box">' +
      '<div class="ai-lbl">✦ ORDENA interpreta y guarda automaticamente</div>' +
      '<div class="ai-row">' +
        '<input class="ai-inp" type="text" id="ai-in" placeholder="Dentista martes 10hs..." onkeydown="if(event.key===\'Enter\')sendIA()">' +
        '<button class="btn btn-acc" onclick="sendIA()">→</button>' +
      '</div>' +
      '<div class="ai-res" id="ai-res"></div>' +
    '</div>' +
    '<div class="card"><div class="card-hdr"><span class="card-title">Ejemplos rapidos</span></div><div class="card-body" style="padding:12px 16px">' + ejHtml + '</div></div>';
}

async function sendIA() {
  var inp = document.getElementById('ai-in');
  var res = document.getElementById('ai-res');
  if (!inp || !inp.value.trim()) return;
  var txt = inp.value.trim();
  res.style.display = 'block'; res.textContent = '⏳ Procesando...';
  try {
    var r = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', 'anthropic-dangerous-request-direct-browser-access': 'true' },
      body: JSON.stringify({
        model: 'claude-sonnet-4-20250514', max_tokens: 500,
        system: 'Asistente ORDENA. Hoy: ' + hoy() + '. SOLO JSON sin markdown. Compromiso: {"accion":"compromiso","titulo":"...","fecha":"YYYY-MM-DD","hora":"HH:MM|null","descripcion":"...|null"} Gasto: {"accion":"gasto","descripcion":"...","monto":numero,"categoria":"Comida|Nafta|Impuestos|Mutual|Renta|Municipalidad|Alquiler|Servicios|Salud|Educacion|Entretenimiento|Transporte|Otro","fecha":"YYYY-MM-DD"} Consulta: {"accion":"consulta","respuesta":"..."}',
        messages: [{ role: 'user', content: txt }]
      })
    });
    var d = await r.json();
    var raw = d.content && d.content[0] ? d.content[0].text : '{}';
    var json;
    try { json = JSON.parse(raw.replace(/```json|```/g,'').trim()); } catch(e) { json = { accion: 'consulta', respuesta: raw }; }
    if (json.accion === 'compromiso') {
      var ins = await sb.from('compromisos').insert({ user_id: currentUser.id, titulo: json.titulo, fecha: json.fecha, hora: json.hora, descripcion: json.descripcion, completado: false });
      if (!ins.error) { await cargar(); res.innerHTML = '✅ <strong>' + json.titulo + '</strong> — ' + fmtD(json.fecha) + (json.hora ? ' a las ' + json.hora : ''); inp.value = ''; renderPag(); }
      else res.textContent = '❌ ' + ins.error.message;
    } else if (json.accion === 'gasto') {
      var ins2 = await sb.from('gastos').insert({ user_id: currentUser.id, descripcion: json.descripcion, monto: json.monto, categoria: json.categoria, fecha: json.fecha });
      if (!ins2.error) { await cargar(); res.innerHTML = '✅ <strong>' + json.descripcion + '</strong> ' + fmt(json.monto) + ' · ' + json.categoria; inp.value = ''; renderPag(); }
      else res.textContent = '❌ ' + ins2.error.message;
    } else {
      res.textContent = json.respuesta || 'No entendi.';
    }
  } catch(e) { res.textContent = '❌ ' + e.message; }
}

/* MODALS */
function showModal(titulo, body) {
  var existing = document.getElementById('modal-ov');
  if (existing) existing.remove();
  var m = document.createElement('div');
  m.id = 'modal-ov'; m.className = 'modal-ov';
  m.innerHTML = '<div class="modal"><div class="modal-handle"></div>' +
    '<div class="modal-hdr"><span class="modal-title">' + titulo + '</span><button class="modal-x" onclick="cerrar()">✕</button></div>' +
    '<div class="modal-body">' + body + '</div></div>';
  m.onclick = function(e) { if (e.target === m) cerrar(); };
  document.body.appendChild(m);
}
window.cerrar = function() { var m = document.getElementById('modal-ov'); if (m) m.remove(); };

window.abrirC = function(fp) {
  fp = fp || '';
  var c = editing;
  var body = '<div class="mfg"><label class="mfl">Titulo *</label><input class="minp" type="text" id="f-tit" value="' + (c ? c.titulo : '') + '" placeholder="Dentista, Reunion..."></div>' +
    '<div class="mfrow">' +
      '<div class="mfg"><label class="mfl">Fecha *</label><input class="minp" type="date" id="f-fec" value="' + (c ? c.fecha : fp || hoy()) + '"></div>' +
      '<div class="mfg"><label class="mfl">Hora</label><input class="minp" type="time" id="f-hora" value="' + (c && c.hora ? c.hora.slice(0,5) : '') + '"></div>' +
    '</div>' +
    '<div class="mfg"><label class="mfl">Notas</label><input class="minp" type="text" id="f-desc" value="' + (c ? (c.descripcion || '') : '') + '" placeholder="Opcional..."></div>' +
    '<button class="btn-main" onclick="guardarC(\'' + (c ? c.id : '') + '\')">' + (c ? 'Guardar cambios' : 'Agregar →') + '</button>';
  showModal(c ? 'Editar compromiso' : 'Nuevo compromiso', body);
};

window.guardarC = async function(id) {
  id = id || '';
  var t = document.getElementById('f-tit') ? document.getElementById('f-tit').value.trim() : '';
  var f = document.getElementById('f-fec') ? document.getElementById('f-fec').value : '';
  var h = document.getElementById('f-hora') ? (document.getElementById('f-hora').value || null) : null;
  var d = document.getElementById('f-desc') ? (document.getElementById('f-desc').value.trim() || null) : null;
  if (!t || !f) { alert('Titulo y fecha son obligatorios'); return; }
  if (id) await sb.from('compromisos').update({ titulo: t, fecha: f, hora: h, descripcion: d }).eq('id', id);
  else    await sb.from('compromisos').insert({ user_id: currentUser.id, titulo: t, fecha: f, hora: h, descripcion: d, completado: false });
  editing = null; cerrar(); await cargar(); renderPag();
};

window.abrirG = function(fp) {
  fp = fp || '';
  var g = editing;
  var catOpts = CATS.map(function(c) {
    return '<option value="' + c.id + '"' + (g && g.categoria === c.id ? ' selected' : '') + '>' + c.emoji + ' ' + c.id + '</option>';
  }).join('');
  var body = '<div class="mfg"><label class="mfl">Descripcion *</label><input class="minp" type="text" id="g-des" value="' + (g ? g.descripcion : '') + '" placeholder="Super, YPF, Alquiler..."></div>' +
    '<div class="mfrow">' +
      '<div class="mfg"><label class="mfl">Monto *</label><input class="minp" type="number" id="g-mnt" value="' + (g ? g.monto : '') + '" placeholder="0" min="0"></div>' +
      '<div class="mfg"><label class="mfl">Fecha *</label><input class="minp" type="date" id="g-fec" value="' + (g ? g.fecha : fp || hoy()) + '"></div>' +
    '</div>' +
    '<div class="mfg"><label class="mfl">Categoria *</label><select class="minp" id="g-cat">' + catOpts + '</select></div>' +
    '<button class="btn-main" onclick="guardarG(\'' + (g ? g.id : '') + '\')">' + (g ? 'Guardar cambios' : 'Registrar →') + '</button>';
  showModal(g ? 'Editar gasto' : 'Nuevo gasto', body);
};

window.guardarG = async function(id) {
  id = id || '';
  var d = document.getElementById('g-des') ? document.getElementById('g-des').value.trim() : '';
  var m = document.getElementById('g-mnt') ? parseFloat(document.getElementById('g-mnt').value) : NaN;
  var f = document.getElementById('g-fec') ? document.getElementById('g-fec').value : '';
  var c = document.getElementById('g-cat') ? document.getElementById('g-cat').value : '';
  if (!d || isNaN(m) || !f) { alert('Completa todos los campos'); return; }
  if (id) await sb.from('gastos').update({ descripcion: d, monto: m, fecha: f, categoria: c }).eq('id', id);
  else    await sb.from('gastos').insert({ user_id: currentUser.id, descripcion: d, monto: m, fecha: f, categoria: c });
  editing = null; cerrar(); await cargar(); renderPag();
};

window.editC = function(id) { editing = data.compromisos.find(function(c) { return c.id === id; }); cerrar(); abrirC(); };
window.editG = function(id) { editing = data.gastos.find(function(g) { return g.id === id; }); cerrar(); abrirG(); };
window.completar = async function(id) { await sb.from('compromisos').update({ completado: true }).eq('id', id); await cargar(); renderPag(); };
window.borrar = async function(tabla, id) {
  if (!confirm('Eliminar este registro?')) return;
  await sb.from(tabla).delete().eq('id', id); await cargar(); renderPag();
};

/* INIT */
(async function() {
  var res = await sb.auth.getSession();
  if (res.data && res.data.session && res.data.session.user) {
    currentUser = res.data.session.user; await cargar(); renderApp();
  } else {
    renderAuth('login');
  }
  sb.auth.onAuthStateChange(function(event) {
    if (event === 'SIGNED_OUT') { currentUser = null; renderAuth('login'); }
  });
})();
</script>
